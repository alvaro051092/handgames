<html lang="pt">
<head>
  <meta charset="UTF-8" />

  <meta property="og:url"   content="https://handgames.app/morra/pt/vs-cpu.html" />
  <meta property="og:title" content="Morra vs CPU — Jogue contra o Computador" />
  <meta property="og:description" content="Escolha seus dedos, aposte o total e a CPU revela os dela na hora." />
  <meta property="og:image" content="https://handgames.app/assets/og-image.png" />
  <meta property="og:locale" content="pt_BR" />
  <meta name="twitter:card"  content="summary_large_image" />
  <meta name="twitter:title" content="Morra vs CPU — Jogue contra o Computador" />
  <meta name="twitter:description" content="Escolha seus dedos, aposte o total e a CPU revela os dela na hora." />
  <meta name="twitter:image" content="https://handgames.app/assets/og-image.png" />
  <link rel="icon" type="image/svg+xml"  href="/assets/favicon.svg" />
  <link rel="icon" type="image/x-icon"  href="/assets/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="/css/tokens.css?v=3" />
  <link rel="stylesheet" href="/css/layout.css?v=3" />
  <link rel="stylesheet" href="/css/components.css?v=3" />
  <link rel="stylesheet" href="/css/animations.css?v=3" />
  <style>
    @keyframes cpuFlipOut{from{transform:rotateY(0deg) scale(1);}to{transform:rotateY(90deg) scale(0.8);}}
    @keyframes cpuFlipIn{from{transform:rotateY(-90deg) scale(0.8);}to{transform:rotateY(0deg) scale(1);}}
    @keyframes countdownPop{0%{transform:scale(0.4);opacity:0;}60%{transform:scale(1.3);opacity:1;}100%{transform:scale(1);opacity:1;}}
    @keyframes fistPulse{0%{transform:scale(1);}40%{transform:scale(1.3) translateY(-4px);}100%{transform:scale(1);}}
    .cpu-flip-out{animation:cpuFlipOut 150ms ease-in forwards;} .cpu-flip-in{animation:cpuFlipIn 150ms ease-out forwards;}
    .countdown-pop{animation:countdownPop 180ms var(--ease-spring) forwards;} .fist-pulse{animation:fistPulse 200ms var(--ease-out);}
    .pick-section-label{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--clr-text-muted);margin-bottom:var(--sp-2);text-align:center;}
    .finger-buttons{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--sp-2);margin-bottom:var(--sp-5);}
    .btn-finger{aspect-ratio:1;border:2px solid var(--clr-border);border-radius:var(--radius-sm);background:var(--clr-surface-2);color:var(--clr-text);font-family:var(--font);font-size:var(--text-xl);font-weight:900;cursor:pointer;transition:border-color var(--dur-fast),background var(--dur-fast),transform var(--dur-fast);}
    .btn-finger:hover{border-color:var(--clr-primary);transform:translateY(-2px);}
    .btn-finger.selected{border-color:var(--clr-primary);background:var(--clr-primary);color:#fff;}
    .guess-buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-2);margin-bottom:var(--sp-5);}
    .btn-guess{padding:var(--sp-2) var(--sp-1);border:2px solid var(--clr-border);border-radius:var(--radius-sm);background:var(--clr-surface-2);color:var(--clr-text);font-family:var(--font);font-size:var(--text-lg);font-weight:800;cursor:pointer;transition:border-color var(--dur-fast),background var(--dur-fast),transform var(--dur-fast);}
    .btn-guess:hover{border-color:var(--clr-primary);transform:translateY(-2px);}
    .btn-guess.selected{border-color:var(--clr-primary);background:var(--clr-primary);color:#fff;}
    .res-finger-num{font-size:3.5rem;font-weight:900;line-height:1;color:var(--clr-primary-light);display:block;margin:var(--sp-2) 0;min-width:2ch;text-align:center;}
    .res-guess-badge{font-size:var(--text-xs);font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:var(--sp-1) var(--sp-3);border-radius:var(--radius-full);display:inline-block;margin-top:var(--sp-1);border:1.5px solid var(--clr-primary);color:var(--clr-primary-light);}
    .result-center-col{display:flex;flex-direction:column;align-items:center;gap:var(--sp-1);}
    .result-plus{font-size:var(--text-2xl);font-weight:900;color:var(--clr-text-muted);}
    .cpu-countdown{font-size:var(--text-2xl);font-weight:900;color:var(--clr-primary-light);min-height:2.2rem;display:flex;align-items:center;justify-content:center;}
    .res-total{text-align:center;margin-top:var(--sp-2);min-height:2.5rem;}
    .res-total-value{font-size:var(--text-lg);font-weight:800;color:var(--clr-text);}
    .result-banner.banner-draw{background:rgba(148,163,184,.12);color:var(--clr-text-muted);}
    .result-banner.banner-loss{background:rgba(239,68,68,.15);color:var(--clr-danger);}
    .player-row-single{display:flex;flex-direction:column;gap:var(--sp-2);margin-bottom:var(--sp-6);}
    .player-row-single label{font-size:var(--text-xs);font-weight:700;color:var(--clr-text-muted);text-transform:uppercase;letter-spacing:.5px;}
    .player-row-single input{background:var(--clr-surface-2);border:1.5px solid var(--clr-border);border-radius:var(--radius-sm);color:var(--clr-text);font-family:var(--font);font-size:var(--text-base);padding:var(--sp-3) var(--sp-4);outline:none;transition:border-color var(--dur-fast),box-shadow var(--dur-fast);width:100%;}
    .player-row-single input:focus{border-color:var(--clr-primary);box-shadow:0 0 0 3px rgba(124,58,237,.25);}
    .back-hub-link{display:block;text-align:center;margin-top:var(--sp-4);font-size:var(--text-sm);color:var(--clr-text-subtle);text-decoration:none;transition:color var(--dur-fast);}
    .back-hub-link:hover{color:var(--clr-text-muted);}
    .session-stats{display:none;background:var(--clr-surface-2);border:1px solid var(--clr-border);border-radius:var(--radius-sm);padding:var(--sp-5);margin-top:var(--sp-4);}
    .fade-in{animation:fadeIn var(--dur-slow) var(--ease-out) forwards;}
    .session-title{font-size:var(--text-xs);font-weight:700;color:var(--clr-text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:var(--sp-4);text-align:center;}
    .session-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-3);}
    .stat-item{display:flex;flex-direction:column;align-items:center;gap:var(--sp-1);}
    .stat-val{font-size:var(--text-xl);font-weight:900;color:var(--clr-primary-light);}
    .stat-label{font-size:var(--text-xs);color:var(--clr-text-subtle);text-align:center;}
    @media(max-width:400px){.session-grid{grid-template-columns:repeat(2,1fr);}.guess-buttons{grid-template-columns:repeat(3,1fr);}}
  </style>
</head>
<body>
  <div id="curtain" aria-hidden="true"></div>
  <div id="confetti-container" aria-hidden="true"></div>
  <button id="btn-mute" class="btn-mute" aria-label="Silenciar áudio" title="Silenciar áudio">🔊</button>
  <div id="app">

    <section id="screen-setup" class="screen active" aria-label="Configuração">
      <header class="screen-header">
        <h1 class="game-title"><span class="title-emoji">🤌</span> Morra</h1>
        <p class="game-subtitle">Você vs CPU · Adivinhe a soma</p>
      </header>
      <div class="card">
        <div class="player-row-single">
          <label for="name-player">Seu nome</label>
          <input id="name-player" type="text" maxlength="20" placeholder="Jogador" autocomplete="off" spellcheck="false" />
        </div>
        <fieldset class="mode-group">
          <legend>Modo de jogo</legend>
          <label class="mode-option"><input type="radio" name="mode" value="best-of-3" checked /><span class="mode-label"><span class="mode-icon">🏆</span><span class="mode-text"><strong>Melhor de 3</strong><small>Primeiro a ganhar 2 rodadas</small></span></span></label>
          <label class="mode-option"><input type="radio" name="mode" value="single" /><span class="mode-label"><span class="mode-icon">⚡</span><span class="mode-text"><strong>Tentativa única</strong><small>Tudo em uma rodada</small></span></span></label>
        </fieldset>
        <button id="btn-start" class="btn btn-primary btn-lg">Jogar!</button>
      </div>
      <a href="/morra/pt/" class="back-hub-link">← Mudar modo</a>
    </section>

    <section id="screen-pick" class="screen" aria-label="Escolha sua jogada">
      <div class="scoreboard">
        <div class="score-block"><span class="score-name" id="sb-name-player">Jogador</span><div class="score-roll" id="roll-player"><span class="score-digit">0</span></div></div>
        <div class="scoreboard-center"><span class="round-badge" id="pick-round-badge">Rodada 1</span></div>
        <div class="score-block"><span class="score-name" id="sb-name-cpu">CPU</span><div class="score-roll" id="roll-cpu"><span class="score-digit">0</span></div></div>
      </div>
      <div class="card pick-card">
        <p class="pick-section-label">Sua aposta — qual será a soma? (2-10)</p>
        <div class="guess-buttons" id="guess-buttons">
          <button class="btn-guess" data-g="2">2</button><button class="btn-guess" data-g="3">3</button><button class="btn-guess" data-g="4">4</button>
          <button class="btn-guess" data-g="5">5</button><button class="btn-guess" data-g="6">6</button><button class="btn-guess" data-g="7">7</button>
          <button class="btn-guess" data-g="8">8</button><button class="btn-guess" data-g="9">9</button><button class="btn-guess" data-g="10">10</button>
        </div>
        <p class="pick-section-label">Seus dedos (1-5)</p>
        <div class="finger-buttons" id="finger-buttons">
          <button class="btn-finger" data-f="1">1</button><button class="btn-finger" data-f="2">2</button><button class="btn-finger" data-f="3">3</button>
          <button class="btn-finger" data-f="4">4</button><button class="btn-finger" data-f="5">5</button>
        </div>
        <button id="btn-confirm" class="btn btn-primary btn-lg" disabled>Revelar!</button>
      </div>
    </section>

    <section id="screen-result" class="screen" aria-label="Resultado da rodada">
      <div class="scoreboard">
        <div class="score-block"><span class="score-name" id="res-name-player">Jogador</span><div class="score-roll" id="res-roll-player"><span class="score-digit">0</span></div></div>
        <div class="scoreboard-center"><span class="round-badge" id="res-round-badge"></span></div>
        <div class="score-block"><span class="score-name" id="res-name-cpu">CPU</span><div class="score-roll" id="res-roll-cpu"><span class="score-digit">0</span></div></div>
      </div>
      <div class="card result-card">
        <div class="result-arena">
          <div class="result-pick-block" id="res-player-block">
            <span class="res-pname" id="res-player-name"></span>
            <span class="res-finger-num" id="res-player-num">0</span>
            <span class="res-guess-badge" id="res-player-guess"></span>
          </div>
          <div class="result-center-col">
            <div class="result-plus">+</div>
            <div id="cpu-countdown" class="cpu-countdown" aria-live="polite"></div>
            <div id="res-total" class="res-total" style="opacity:0"><span class="res-total-value" id="res-total-value"></span></div>
          </div>
          <div class="result-pick-block" id="res-cpu-block">
            <span class="res-pname">CPU</span>
            <span class="res-finger-num" id="res-cpu-num">?</span>
            <span class="res-guess-badge" id="res-cpu-guess"></span>
          </div>
        </div>
        <div id="result-banner" class="result-banner" role="status" aria-live="polite"></div>
        <div class="result-actions">
          <button id="btn-next-round"      class="btn btn-primary btn-lg">Próxima rodada →</button>
          <button id="btn-retry-round"     class="btn btn-secondary">↩ Repetir rodada</button>
          <button id="btn-revenge"         class="btn btn-secondary">🔄 Revanche</button>
          <button id="btn-new-game-result" class="btn btn-ghost">Nova partida</button>
        </div>
      </div>
    </section>

    <section id="screen-gameover" class="screen" aria-label="Fim de jogo">
      <div class="card gameover-card">
        <div class="gameover-trophy" id="go-trophy">🏆</div>
        <h2 class="gameover-title"><span id="go-winner-name" class="go-winner-name"></span><span id="go-title-suffix"></span></h2>
        <p class="gameover-subtitle" id="go-subtitle"></p>
        <div class="gameover-score">
          <div class="go-score-block"><span class="score-name" id="go-name-player"></span><span class="go-score-val" id="go-val-player">0</span></div>
          <span class="go-dash">—</span>
          <div class="go-score-block"><span class="score-name" id="go-name-cpu"></span><span class="go-score-val" id="go-val-cpu">0</span></div>
        </div>
        <div id="session-stats" class="session-stats" aria-label="Estatísticas da sessão">
          <h3 class="session-title">Estatísticas da sessão</h3>
          <div class="session-grid">
            <div class="stat-item"><span class="stat-val" id="stat-matches">0</span><span class="stat-label">Partidas</span></div>
            <div class="stat-item"><span class="stat-val" id="stat-wins">0</span><span class="stat-label">Ganhas</span></div>
            <div class="stat-item"><span class="stat-val" id="stat-losses">0</span><span class="stat-label">Perdidas</span></div>
            <div class="stat-item"><span class="stat-val" id="stat-winpct">0%</span><span class="stat-label">% vitória</span></div>
          </div>
        </div>
        <div class="gameover-actions">
          <button id="btn-revenge-go"  class="btn btn-primary btn-lg">🔄 Revanche</button>
          <button id="btn-new-game-go" class="btn btn-ghost">Nova partida</button>
          <a href="/morra/pt/" class="btn btn-ghost">Mudar modo</a>
        </div>
      </div>
    </section>

  </div>
  <script src="/js/game-morra-cpu.js?v=1"></script>
  <script src="/js/audio.js?v=2"></script>
  <script src="/js/ui-morra-cpu.js?v=1"></script>
</body>
</html>
