  <style>
    @keyframes fistOpen{0%{transform:scale(1) rotate(-5deg);}50%{transform:scale(1.4) rotate(5deg);}100%{transform:scale(1.2) rotate(0deg);}}
    .fist-open{animation:fistOpen 300ms var(--ease-spring) forwards;}
    .battle-arena{display:flex;justify-content:space-around;align-items:center;padding:var(--sp-6) var(--sp-4);gap:var(--sp-4);}
    .battle-player{display:flex;flex-direction:column;align-items:center;gap:var(--sp-2);}
    .battle-player-name{font-size:var(--text-sm);font-weight:700;color:var(--clr-text-muted);text-align:center;}
    .battle-fist{font-size:4rem;line-height:1;display:block;transition:transform var(--dur-fast);}
    .battle-vs{font-size:var(--text-2xl);font-weight:900;color:var(--clr-text-subtle);}
    .res-finger-num{font-size:3.5rem;font-weight:900;line-height:1;color:var(--clr-primary-light);display:block;margin:var(--sp-2) 0;min-width:2ch;text-align:center;}
    .res-guess-badge{font-size:var(--text-xs);font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:var(--sp-1) var(--sp-3);border-radius:var(--radius-full);display:inline-block;margin-top:var(--sp-1);border:1.5px solid var(--clr-primary);color:var(--clr-primary-light);}
    .res-total{text-align:center;margin:var(--sp-3) 0 var(--sp-1);}
    .res-total-value{font-size:var(--text-xl);font-weight:800;color:var(--clr-text);}
    .back-hub-link{display:block;text-align:center;margin-top:var(--sp-4);font-size:var(--text-sm);color:var(--clr-text-subtle);text-decoration:none;transition:color var(--dur-fast);}
    .back-hub-link:hover{color:var(--clr-text-muted);}
  </style>

<body>
  <div id="curtain" aria-hidden="true"></div>
  <div id="confetti-container" aria-hidden="true"></div>
  <button id="btn-mute" class="btn-mute" aria-label="Mute audio" title="Mute audio">🔊</button>
  <div id="app">

    <section id="screen-setup" class="screen active" aria-label="Setup">
      <header class="screen-header">
        <h1 class="game-title"><span class="title-emoji">⚔️</span> Morra Battle</h1>
        <p class="game-subtitle">CPU decides everything · Pure luck</p>
      </header>
      <div class="card">
        <div class="players-row">
          <div class="field"><label for="name-p1">Player 1</label><input id="name-p1" type="text" maxlength="20" placeholder="Player 1" autocomplete="off" spellcheck="false" /></div>
          <div class="vs-badge">VS</div>
          <div class="field"><label for="name-p2">Player 2</label><input id="name-p2" type="text" maxlength="20" placeholder="Player 2" autocomplete="off" spellcheck="false" /></div>
        </div>
        <fieldset class="mode-group">
          <legend>Game mode</legend>
          <label class="mode-option"><input type="radio" name="mode" value="best-of-3" checked /><span class="mode-label"><span class="mode-icon">🏆</span><span class="mode-text"><strong>Best of 3</strong><small>First to win 2 rounds</small></span></span></label>
          <label class="mode-option"><input type="radio" name="mode" value="single" /><span class="mode-label"><span class="mode-icon">⚡</span><span class="mode-text"><strong>Single round</strong><small>Everything on one round</small></span></span></label>
        </fieldset>
        <button id="btn-start" class="btn btn-primary btn-lg">Play!</button>
      </div>
      <a href="/morra/en/" class="back-hub-link">← Change mode</a>
    </section>

    <section id="screen-battle" class="screen" aria-label="Battle arena">
      <div class="scoreboard">
        <div class="score-block"><span class="score-name" id="sb-name-p1">P1</span><div class="score-roll" id="roll-p1"><span class="score-digit">0</span></div></div>
        <div class="scoreboard-center"><span class="round-badge" id="battle-round-badge">Round 1</span></div>
        <div class="score-block"><span class="score-name" id="sb-name-p2">P2</span><div class="score-roll" id="roll-p2"><span class="score-digit">0</span></div></div>
      </div>
      <div class="card">
        <div class="battle-arena">
          <div class="battle-player"><span class="battle-player-name" id="battle-name-p1">Player 1</span><span class="battle-fist" id="battle-fist-p1" aria-hidden="true">✊</span></div>
          <span class="battle-vs" aria-hidden="true">VS</span>
          <div class="battle-player"><span class="battle-player-name" id="battle-name-p2">Player 2</span><span class="battle-fist" id="battle-fist-p2" aria-hidden="true">✊</span></div>
        </div>
        <button id="btn-reveal" class="btn btn-primary btn-lg">Reveal fingers!</button>
      </div>
    </section>

    <section id="screen-result" class="screen" aria-label="Round result">
      <div class="scoreboard">
        <div class="score-block"><span class="score-name" id="res-name-p1">P1</span><div class="score-roll" id="res-roll-p1"><span class="score-digit">0</span></div></div>
        <div class="scoreboard-center"><span class="round-badge" id="res-round-badge"></span></div>
        <div class="score-block"><span class="score-name" id="res-name-p2">P2</span><div class="score-roll" id="res-roll-p2"><span class="score-digit">0</span></div></div>
      </div>
      <div class="card result-card">
        <div class="result-arena">
          <div class="result-pick-block" id="res-p1-block">
            <span class="res-pname" id="res-p1-name"></span>
            <span class="res-finger-num" id="res-p1-num">0</span>
            <span class="res-guess-badge" id="res-p1-guess"></span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:var(--sp-2)">
            <div style="font-size:var(--text-2xl);font-weight:900;color:var(--clr-text-muted)">+</div>
            <div class="res-total"><span class="res-total-value" id="res-total-value"></span></div>
          </div>
          <div class="result-pick-block" id="res-p2-block">
            <span class="res-pname" id="res-p2-name"></span>
            <span class="res-finger-num" id="res-p2-num">0</span>
            <span class="res-guess-badge" id="res-p2-guess"></span>
          </div>
        </div>
        <div id="result-banner" class="result-banner" role="status" aria-live="polite"></div>
        <div class="result-actions">
          <button id="btn-next-round"      class="btn btn-primary btn-lg">Next round →</button>
          <button id="btn-revenge"         class="btn btn-secondary">🔄 Rematch</button>
          <button id="btn-new-game-result" class="btn btn-ghost">New game</button>
        </div>
      </div>
    </section>

    <section id="screen-gameover" class="screen" aria-label="Game over">
      <div class="card gameover-card">
        <div class="gameover-trophy" id="go-trophy">🏆</div>
        <h2 class="gameover-title"><span id="go-winner-name" class="go-winner-name"></span><span id="go-title-suffix"></span></h2>
        <p class="gameover-subtitle" id="go-subtitle"></p>
        <div class="gameover-score">
          <div class="go-score-block"><span class="score-name" id="go-name-p1"></span><span class="go-score-val" id="go-val-p1">0</span></div>
          <span class="go-dash">—</span>
          <div class="go-score-block"><span class="score-name" id="go-name-p2"></span><span class="go-score-val" id="go-val-p2">0</span></div>
        </div>
        <div class="gameover-actions">
          <button id="btn-revenge-go"  class="btn btn-primary btn-lg">🔄 Rematch</button>
          <button id="btn-new-game-go" class="btn btn-ghost">New game</button>
          <a href="/morra/en/" class="btn btn-ghost">Change mode</a>
        </div>
      </div>
    </section>

  </div>
  <script src="/js/game-morra-battle.js?v=1"></script>
  <script src="/js/audio.js?v=2"></script>
  <script src="/js/ui-morra-battle.js?v=1"></script>
</body>
</html>
