  <link rel="stylesheet" href="/css/animations.css?v=3" />
  <style>
    /* ── Chopsticks board ── */
    .chop-board{display:flex;flex-direction:column;align-items:center;gap:var(--sp-5);width:100%;max-width:360px;margin:0 auto;padding:var(--sp-2) var(--sp-2) var(--sp-2);}
    .chop-section{display:flex;flex-direction:column;align-items:center;gap:var(--sp-3);}
    .chop-section-label{font-size:var(--text-sm);font-weight:700;color:var(--clr-text-muted);letter-spacing:.5px;text-transform:uppercase;}
    .chop-hands{display:flex;gap:var(--sp-5);}
    .chop-hand{width:120px;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:2.5px solid var(--clr-border);border-radius:var(--radius-lg);background:var(--clr-surface);cursor:default;transition:border-color var(--dur-fast),background var(--dur-fast),transform var(--dur-fast),box-shadow var(--dur-fast),opacity var(--dur-fast);user-select:none;-webkit-user-select:none;padding:var(--sp-3);}
    .chop-hand .h-emoji{font-size:2.4rem;line-height:1;}
    .chop-hand .h-count{font-size:var(--text-2xl);font-weight:900;color:var(--clr-primary-light);line-height:1;}
    .chop-hand .h-label{font-size:var(--text-xs);color:var(--clr-text-subtle);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
    .chop-hand.elim{opacity:.3;border-style:dashed;cursor:not-allowed;}
    .chop-hand.selectable{border-color:var(--clr-primary);cursor:pointer;}
    .chop-hand.selectable:hover{background:var(--clr-surface-2);transform:translateY(-4px);box-shadow:var(--shadow-primary);}
    .chop-hand.selected{border-color:var(--clr-primary-light);background:var(--clr-surface-2);transform:translateY(-4px);box-shadow:var(--shadow-primary);cursor:pointer;}
    @keyframes chop-pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4);}50%{box-shadow:0 0 0 8px rgba(239,68,68,0);}}
    .chop-hand.targetable{border-color:#ef4444;cursor:pointer;animation:chop-pulse 1s ease-in-out infinite;}
    .chop-hand.targetable:hover{background:rgba(239,68,68,.08);transform:translateY(-4px);}
    @keyframes chop-hit{0%{transform:scale(1) rotate(0);}25%{transform:scale(1.35) rotate(8deg);}60%{transform:scale(.9) rotate(-3deg);}100%{transform:scale(1) rotate(0);}}
    .chop-hit{animation:chop-hit .35s var(--ease-spring) forwards!important;}
    .chop-divider{width:100%;max-width:280px;display:flex;align-items:center;justify-content:center;min-height:1.4em;}
    .last-move-text{font-size:var(--text-xs);color:var(--clr-text-subtle);text-align:center;}
    .hint-text{font-size:var(--text-sm);color:var(--clr-text-muted);text-align:center;min-height:1.5em;padding:0 var(--sp-4);}
    .back-hub-link{display:block;text-align:center;margin-top:var(--sp-4);font-size:var(--text-sm);color:var(--clr-text-subtle);text-decoration:none;transition:color var(--dur-fast);}
    .back-hub-link:hover{color:var(--clr-text-muted);}
    /* round-over */
    .round-over-card{text-align:center;padding:var(--sp-8) var(--sp-6);display:flex;flex-direction:column;align-items:center;gap:var(--sp-4);}
    .ro-trophy{font-size:4rem;}
    .ro-title{font-size:var(--text-xl);font-weight:800;color:var(--clr-primary-light);margin:0;}
    /* session stats */
    .session-stats{display:none;margin-top:var(--sp-4);padding:var(--sp-4);background:var(--clr-surface-2);border-radius:var(--radius-lg);border:1px solid var(--clr-border);}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-2);text-align:center;}
    .stat-item .stat-val{font-size:var(--text-xl);font-weight:900;color:var(--clr-primary-light);}
    .stat-item .stat-lbl{font-size:var(--text-xs);color:var(--clr-text-subtle);margin-top:2px;}
  </style>
</head>
<body>
  <div id="curtain" aria-hidden="true"></div>
  <div id="confetti-container" aria-hidden="true"></div>
  <button id="btn-mute" class="btn-mute" aria-label="Silenciar audio" title="Silenciar audio">🔊</button>
  <div id="app">

    <!-- SETUP -->
    <section id="screen-setup" class="screen active" aria-label="Configuración">
      <header class="screen-header">
        <h1 class="game-title"><span class="title-emoji">🖖</span> Palillos vs CPU</h1>
        <p class="game-subtitle">Elimina ambas manos de la CPU</p>
      </header>
      <div class="card">
        <div class="field">
          <label for="name-player">Tu nombre</label>
          <input id="name-player" type="text" maxlength="20" placeholder="Jugador" autocomplete="off" spellcheck="false" />
        </div>
        <fieldset class="mode-group">
          <legend>Modo de juego</legend>
          <label class="mode-option">
            <input type="radio" name="mode" value="best-of-3" checked />
            <span class="mode-label"><span class="mode-icon">🏆</span><span class="mode-text"><strong>Mejor de 3</strong><small>Primero en ganar 2 partidas</small></span></span>
          </label>
          <label class="mode-option">
            <input type="radio" name="mode" value="single" />
            <span class="mode-label"><span class="mode-icon">⚡</span><span class="mode-text"><strong>Partida única</strong><small>Una sola partida</small></span></span>
          </label>
        </fieldset>
        <button id="btn-start" class="btn btn-primary btn-lg">¡Jugar!</button>
      </div>
      <a href="/chopsticks/" class="back-hub-link">← Cambiar modo</a>
    </section>

    <!-- GAME -->
    <section id="screen-game" class="screen" aria-label="Partida">
      <div class="scoreboard">
        <div class="score-block">
          <span class="score-name" id="sb-name-cpu">CPU</span>
          <div class="score-roll" id="roll-cpu"><span class="score-digit">0</span></div>
        </div>
        <div class="scoreboard-center">
          <span class="round-badge" id="turn-badge">Tu turno</span>
        </div>
        <div class="score-block">
          <span class="score-name" id="sb-name-player">Jugador</span>
          <div class="score-roll" id="roll-player"><span class="score-digit">0</span></div>
        </div>
      </div>

      <div class="chop-board">
        <!-- CPU hands (top / opponent) -->
        <div class="chop-section">
          <span class="chop-section-label">CPU</span>
          <div class="chop-hands">
            <button class="chop-hand" id="hand-cpu-left" data-who="cpu" data-side="left" aria-label="Mano izquierda CPU">
              <span class="h-emoji" id="emoji-cpu-left">☝️</span>
              <span class="h-count" id="count-cpu-left">1</span>
              <span class="h-label" id="h-label-cpu-left">Izq</span>
            </button>
            <button class="chop-hand" id="hand-cpu-right" data-who="cpu" data-side="right" aria-label="Mano derecha CPU">
              <span class="h-emoji" id="emoji-cpu-right">☝️</span>
              <span class="h-count" id="count-cpu-right">1</span>
              <span class="h-label" id="h-label-cpu-right">Der</span>
            </button>
          </div>
        </div>

        <div class="chop-divider">
          <span class="last-move-text" id="last-move-text"></span>
        </div>

        <!-- Player hands (bottom) -->
        <div class="chop-section">
          <div class="chop-hands">
            <button class="chop-hand" id="hand-player-left" data-who="player" data-side="left" aria-label="Tu mano izquierda">
              <span class="h-emoji" id="emoji-player-left">☝️</span>
              <span class="h-count" id="count-player-left">1</span>
              <span class="h-label" id="h-label-player-left">Izq</span>
            </button>
            <button class="chop-hand" id="hand-player-right" data-who="player" data-side="right" aria-label="Tu mano derecha">
              <span class="h-emoji" id="emoji-player-right">☝️</span>
              <span class="h-count" id="count-player-right">1</span>
              <span class="h-label" id="h-label-player-right">Der</span>
            </button>
          </div>
          <span class="chop-section-label" id="label-player">Tú</span>
        </div>
      </div>

      <p class="hint-text" id="hint-text">Selecciona tu mano para atacar</p>
      <span class="round-badge" id="game-count-badge" style="display:block;text-align:center;margin-top:var(--sp-2);">Partida 1</span>
      <a href="/chopsticks/" class="back-hub-link">← Cambiar modo</a>
    </section>

    <!-- ROUND OVER (best-of-3 intermediate) -->
    <section id="screen-round-over" class="screen" aria-label="Partida terminada">
      <div class="card round-over-card">
        <span class="ro-trophy" id="ro-trophy">🏆</span>
        <h2 class="ro-title" id="ro-title">¡Ganaste esta partida!</h2>
        <div class="result-actions">
          <button id="btn-next-game" class="btn btn-primary btn-lg">Siguiente partida →</button>
          <button id="btn-new-series" class="btn btn-ghost">Nueva serie</button>
        </div>
      </div>
    </section>

    <!-- GAME OVER -->
    <section id="screen-gameover" class="screen" aria-label="Fin de juego">
      <div class="card gameover-card">
        <div class="gameover-trophy" id="go-trophy">🏆</div>
        <h2 class="gameover-title">
          <span id="go-winner-name" class="go-winner-name"></span>
          <span id="go-title-suffix"></span>
        </h2>
        <p class="gameover-subtitle" id="go-subtitle"></p>
        <div class="gameover-score">
          <div class="go-score-block"><span class="score-name" id="go-name-player"></span><span class="go-score-val" id="go-val-player">0</span></div>
          <span class="go-dash">—</span>
          <div class="go-score-block"><span class="score-name" id="go-name-cpu"></span><span class="go-score-val" id="go-val-cpu">0</span></div>
        </div>
        <div id="session-stats" class="session-stats">
          <div class="stats-grid">
            <div class="stat-item"><div class="stat-val" id="stat-matches">0</div><div class="stat-lbl">Partidas</div></div>
            <div class="stat-item"><div class="stat-val" id="stat-wins">0</div><div class="stat-lbl">Victorias</div></div>
            <div class="stat-item"><div class="stat-val" id="stat-losses">0</div><div class="stat-lbl">Derrotas</div></div>
            <div class="stat-item"><div class="stat-val" id="stat-winpct">0%</div><div class="stat-lbl">% Victorias</div></div>
          </div>
        </div>
        <div class="gameover-actions">
          <button id="btn-revenge-go"  class="btn btn-primary btn-lg">🔄 Revancha</button>
          <button id="btn-new-game-go" class="btn btn-ghost">Nueva partida</button>
          <a href="/chopsticks/" class="btn btn-ghost">Cambiar modo</a>
        </div>
      </div>
    </section>

  </div>
  <script src="/js/game-chopsticks-cpu.js?v=1"></script>
  <script src="/js/audio.js?v=2"></script>
  <script src="/js/ui-chopsticks-cpu.js?v=1"></script>
</body>
</html>
