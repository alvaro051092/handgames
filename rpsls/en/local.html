  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />

  <style>
    .pick-buttons-rpsls { display: flex; flex-direction: column; gap: var(--sp-3); margin: var(--sp-4) 0; }
    .pick-row { display: flex; justify-content: center; gap: var(--sp-3); }
    .pick-row .btn-pick { flex: 1; max-width: 110px; }
    .handoff-card { text-align: center; padding: var(--sp-10) var(--sp-6); }
    .handoff-icon { font-size: 4rem; display: block; margin-bottom: var(--sp-4); animation: float 3s var(--ease-in-out) infinite; }
    .handoff-msg { font-size: var(--text-lg); font-weight: 700; color: var(--clr-text); margin-bottom: var(--sp-2); }
    .handoff-hint { font-size: var(--text-sm); color: var(--clr-text-muted); margin-bottom: var(--sp-8); }
    .back-hub-link { display: block; text-align: center; margin-top: var(--sp-4); font-size: var(--text-sm); color: var(--clr-text-subtle); text-decoration: none; transition: color var(--dur-fast); }
    .back-hub-link:hover { color: var(--clr-text-muted); }
  </style>

<body>

  <div id="curtain" aria-hidden="true"></div>
  <div id="confetti-container" aria-hidden="true"></div>
  <button id="btn-mute" class="btn-mute" aria-label="Mute audio" title="Mute audio">🔊</button>

  <div id="app">

    <section id="screen-setup" class="screen active" aria-label="Setup">
      <header class="screen-header">
        <h1 class="game-title"><span class="title-emoji">👥</span> 2 Players</h1>
        <p class="game-subtitle">Rock Paper Scissors Lizard Spock</p>
      </header>
      <div class="card">
        <div class="players-row">
          <div class="field">
            <label for="name-p1">Player 1</label>
            <input id="name-p1" type="text" maxlength="20" placeholder="Player 1"
                   autocomplete="off" spellcheck="false" />
          </div>
          <div class="vs-badge">VS</div>
          <div class="field">
            <label for="name-p2">Player 2</label>
            <input id="name-p2" type="text" maxlength="20" placeholder="Player 2"
                   autocomplete="off" spellcheck="false" />
          </div>
        </div>
        <fieldset class="mode-group">
          <legend>Game mode</legend>
          <label class="mode-option">
            <input type="radio" name="mode" value="best-of-3" checked />
            <span class="mode-label">
              <span class="mode-icon">🏆</span>
              <span class="mode-text"><strong>Best of 3</strong><small>First to win 2 rounds</small></span>
            </span>
          </label>
          <label class="mode-option">
            <input type="radio" name="mode" value="single" />
            <span class="mode-label">
              <span class="mode-icon">⚡</span>
              <span class="mode-text"><strong>Single game</strong><small>Everything in one round</small></span>
            </span>
          </label>
        </fieldset>
        <button id="btn-start" class="btn btn-primary btn-lg">Play!</button>
      </div>
      <a href="/rpsls/en/" class="back-hub-link">← Change mode</a>
    </section>

    <section id="screen-pick" class="screen" aria-label="Pick your move">
      <div class="scoreboard">
        <div class="score-block">
          <span class="score-name" id="sb-name-p1">P1</span>
          <div class="score-roll" id="roll-p1"><span class="score-digit">0</span></div>
        </div>
        <div class="scoreboard-center">
          <span class="round-badge" id="pick-round-badge">Round 1</span>
        </div>
        <div class="score-block">
          <span class="score-name" id="sb-name-p2">P2</span>
          <div class="score-roll" id="roll-p2"><span class="score-digit">0</span></div>
        </div>
      </div>
      <div class="card pick-card">
        <p class="pick-hint" id="pick-prompt">Choose your move</p>
        <div class="pick-buttons-rpsls">
          <div class="pick-row">
            <button class="btn btn-pick" data-pick="rock" aria-label="Pick Rock">
              <span class="pick-emoji">🪨</span><span class="pick-label">Rock</span>
            </button>
            <button class="btn btn-pick" data-pick="paper" aria-label="Pick Paper">
              <span class="pick-emoji">📄</span><span class="pick-label">Paper</span>
            </button>
            <button class="btn btn-pick" data-pick="scissors" aria-label="Pick Scissors">
              <span class="pick-emoji">✂️</span><span class="pick-label">Scissors</span>
            </button>
          </div>
          <div class="pick-row">
            <button class="btn btn-pick" data-pick="lizard" aria-label="Pick Lizard">
              <span class="pick-emoji">🦎</span><span class="pick-label">Lizard</span>
            </button>
            <button class="btn btn-pick" data-pick="spock" aria-label="Pick Spock">
              <span class="pick-emoji">🖖</span><span class="pick-label">Spock</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <section id="screen-handoff" class="screen" aria-label="Pass device">
      <div class="card handoff-card">
        <span class="handoff-icon" aria-hidden="true">📱</span>
        <p class="handoff-msg" id="handoff-msg">Pass the device to the next player</p>
        <p class="handoff-hint">The previous pick is hidden</p>
        <button id="btn-handoff-ready" class="btn btn-primary btn-lg">Ready →</button>
      </div>
    </section>

    <section id="screen-result" class="screen" aria-label="Round result">
      <div class="scoreboard">
        <div class="score-block">
          <span class="score-name" id="res-name-p1">P1</span>
          <div class="score-roll" id="res-roll-p1"><span class="score-digit">0</span></div>
        </div>
        <div class="scoreboard-center">
          <span class="round-badge" id="res-round-badge"></span>
        </div>
        <div class="score-block">
          <span class="score-name" id="res-name-p2">P2</span>
          <div class="score-roll" id="res-roll-p2"><span class="score-digit">0</span></div>
        </div>
      </div>
      <div class="card result-card">
        <div class="result-arena">
          <div class="result-pick-block">
            <span class="res-pname" id="res-name-p1-pick"></span>
            <span class="res-emoji" id="res-p1-emoji"></span>
            <span class="res-pick-label" id="res-p1-label"></span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:var(--sp-1);">
            <div class="result-vs">VS</div>
          </div>
          <div class="result-pick-block">
            <span class="res-pname" id="res-name-p2-pick"></span>
            <span class="res-emoji" id="res-p2-emoji"></span>
            <span class="res-pick-label" id="res-p2-label"></span>
          </div>
        </div>
        <div id="result-banner" class="result-banner" role="status" aria-live="polite"></div>
        <div class="result-actions">
          <button id="btn-next-round"      class="btn btn-primary btn-lg">Next round →</button>
          <button id="btn-retry-round"     class="btn btn-secondary">↩ Retry round</button>
          <button id="btn-revenge"         class="btn btn-secondary">🔄 Rematch</button>
          <button id="btn-new-game-result" class="btn btn-ghost">New game</button>
        </div>
      </div>
    </section>

    <section id="screen-gameover" class="screen" aria-label="Game over">
      <div class="card gameover-card">
        <div class="gameover-trophy" id="go-trophy">🏆</div>
        <h2 class="gameover-title">
          <span id="go-winner-name" class="go-winner-name"></span>
          <span id="go-title-suffix"></span>
        </h2>
        <p class="gameover-subtitle" id="go-subtitle"></p>
        <div class="gameover-score">
          <div class="go-score-block">
            <span class="score-name" id="go-name-p1"></span>
            <span class="go-score-val" id="go-val-p1">0</span>
          </div>
          <span class="go-dash">—</span>
          <div class="go-score-block">
            <span class="score-name" id="go-name-p2"></span>
            <span class="go-score-val" id="go-val-p2">0</span>
          </div>
        </div>
        <div class="gameover-actions">
          <button id="btn-revenge-go"  class="btn btn-primary btn-lg">🔄 Rematch</button>
          <button id="btn-new-game-go" class="btn btn-ghost">New game</button>
          <a href="/rpsls/en/" class="btn btn-ghost">Change mode</a>
        </div>
      </div>
    </section>

  </div>

  <script src="/js/analytics.js?v=1"></script>
  <script src="/js/game-rpsls-local.js?v=1"></script>
  <script src="/js/audio.js?v=2"></script>
  <script src="/js/ui-rpsls-local.js?v=1"></script>
</body>
</html>
