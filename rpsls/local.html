<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <title>Piedra Papel Tijeras Lagarto Spock — 2 Jugadores en el mismo dispositivo</title>
  <meta name="description" content="Juega Piedra Papel Tijeras Lagarto Spock con un amigo en el mismo dispositivo. Turno a turno con pantalla de handoff. 5 gestos, 10 relaciones." />
  <link rel="canonical"      href="https://handgames.app/rpsls/local.html" />
  <link rel="alternate" hreflang="es"        href="https://handgames.app/rpsls/local.html" />
  <link rel="alternate" hreflang="en"        href="https://handgames.app/rpsls/en/local.html" />
  <link rel="alternate" hreflang="pt"        href="https://handgames.app/rpsls/pt/local.html" />
  <link rel="alternate" hreflang="x-default" href="https://handgames.app/rpsls/local.html" />
  <meta property="og:type"             content="website" />
  <meta property="og:url"              content="https://handgames.app/rpsls/local.html" />
  <meta property="og:title"            content="RPSLS — 2 Jugadores Piedra Papel Tijeras Lagarto Spock" />
  <meta property="og:description"      content="Turno a turno en el mismo dispositivo. 5 gestos, 10 relaciones de victoria." />
  <meta property="og:image"            content="https://handgames.app/assets/og-image.png" />
  <meta property="og:locale"           content="es_ES" />
  <meta property="og:locale:alternate" content="en_US" />
  <meta property="og:locale:alternate" content="pt_BR" />
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="RPSLS — 2 Jugadores Piedra Papel Tijeras Lagarto Spock" />
  <meta name="twitter:description" content="Turno a turno con handoff. 5 gestos, 10 relaciones." />
  <meta name="twitter:image"       content="https://handgames.app/assets/og-image.png" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Piedra Papel Tijeras Lagarto Spock — 2 Jugadores",
    "alternateName": ["Rock Paper Scissors Lizard Spock 2 Players", "Pedra Papel Tesoura Lagarto Spock 2 Jogadores"],
    "url": "https://handgames.app/rpsls/local.html",
    "description": "Modo 2 jugadores en el mismo dispositivo. Turno a turno con pantalla de handoff.",
    "applicationCategory": "GameApplication",
    "operatingSystem": "Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "inLanguage": ["es", "en", "pt"],
    "genre": "Casual game"
  }
  </script>
  <link rel="icon" type="image/x-icon"  href="/assets/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
  <link rel="apple-touch-icon"          href="/assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="/css/tokens.css?v=3" />
  <link rel="stylesheet" href="/css/layout.css?v=3" />
  <link rel="stylesheet" href="/css/components.css?v=3" />
  <link rel="stylesheet" href="/css/animations.css?v=3" />
  <style>
    /* ── Pick grid: 3+2 layout ── */
    .pick-buttons-rpsls {
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
      margin: var(--sp-4) 0;
    }
    .pick-row {
      display: flex;
      justify-content: center;
      gap: var(--sp-3);
    }
    .pick-row .btn-pick {
      flex: 1;
      max-width: 110px;
    }

    /* ── Handoff screen ── */
    .handoff-card {
      text-align: center;
      padding: var(--sp-10) var(--sp-6);
    }
    .handoff-icon {
      font-size: 4rem;
      display: block;
      margin-bottom: var(--sp-4);
      animation: float 3s var(--ease-in-out) infinite;
    }
    .handoff-msg {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--clr-text);
      margin-bottom: var(--sp-2);
    }
    .handoff-hint {
      font-size: var(--text-sm);
      color: var(--clr-text-muted);
      margin-bottom: var(--sp-8);
    }

    /* ── Setup ── */
    .back-hub-link {
      display: block;
      text-align: center;
      margin-top: var(--sp-4);
      font-size: var(--text-sm);
      color: var(--clr-text-subtle);
      text-decoration: none;
      transition: color var(--dur-fast);
    }
    .back-hub-link:hover { color: var(--clr-text-muted); }
  </style>
</head>
<body>

  <div id="curtain" aria-hidden="true"></div>
  <div id="confetti-container" aria-hidden="true"></div>
  <button id="btn-mute" class="btn-mute" aria-label="Silenciar audio" title="Silenciar audio">🔊</button>

  <div id="app">

    <!-- ══════════════════ SETUP ══════════════════ -->
    <section id="screen-setup" class="screen active" aria-label="Configuración">
      <header class="screen-header">
        <h1 class="game-title"><span class="title-emoji">👥</span> 2 Jugadores</h1>
        <p class="game-subtitle">Piedra Papel Tijeras Lagarto Spock</p>
      </header>

      <div class="card">
        <div class="players-row">
          <div class="field">
            <label for="name-p1">Jugador 1</label>
            <input id="name-p1" type="text" maxlength="20" placeholder="Jugador 1"
                   autocomplete="off" spellcheck="false" />
          </div>
          <div class="vs-badge">VS</div>
          <div class="field">
            <label for="name-p2">Jugador 2</label>
            <input id="name-p2" type="text" maxlength="20" placeholder="Jugador 2"
                   autocomplete="off" spellcheck="false" />
          </div>
        </div>

        <fieldset class="mode-group">
          <legend>Modo de juego</legend>
          <label class="mode-option">
            <input type="radio" name="mode" value="best-of-3" checked />
            <span class="mode-label">
              <span class="mode-icon">🏆</span>
              <span class="mode-text">
                <strong>Mejor de 3</strong>
                <small>Primero en ganar 2 rondas</small>
              </span>
            </span>
          </label>
          <label class="mode-option">
            <input type="radio" name="mode" value="single" />
            <span class="mode-label">
              <span class="mode-icon">⚡</span>
              <span class="mode-text">
                <strong>Intento único</strong>
                <small>Todo en una sola ronda</small>
              </span>
            </span>
          </label>
        </fieldset>

        <button id="btn-start" class="btn btn-primary btn-lg">¡Jugar!</button>
      </div>

      <a href="/rpsls/" class="back-hub-link">← Cambiar modo</a>
    </section>

    <!-- ══════════════════ PICK ══════════════════ -->
    <section id="screen-pick" class="screen" aria-label="Selección de jugada">
      <div class="scoreboard">
        <div class="score-block">
          <span class="score-name" id="sb-name-p1">J1</span>
          <div class="score-roll" id="roll-p1"><span class="score-digit">0</span></div>
        </div>
        <div class="scoreboard-center">
          <span class="round-badge" id="pick-round-badge">Ronda 1</span>
        </div>
        <div class="score-block">
          <span class="score-name" id="sb-name-p2">J2</span>
          <div class="score-roll" id="roll-p2"><span class="score-digit">0</span></div>
        </div>
      </div>

      <div class="card pick-card">
        <p class="pick-hint" id="pick-prompt">Elige tu jugada</p>
        <div class="pick-buttons-rpsls">
          <div class="pick-row">
            <button class="btn btn-pick" data-pick="rock" aria-label="Elegir Piedra">
              <span class="pick-emoji">🪨</span>
              <span class="pick-label">Piedra</span>
            </button>
            <button class="btn btn-pick" data-pick="paper" aria-label="Elegir Papel">
              <span class="pick-emoji">📄</span>
              <span class="pick-label">Papel</span>
            </button>
            <button class="btn btn-pick" data-pick="scissors" aria-label="Elegir Tijeras">
              <span class="pick-emoji">✂️</span>
              <span class="pick-label">Tijeras</span>
            </button>
          </div>
          <div class="pick-row">
            <button class="btn btn-pick" data-pick="lizard" aria-label="Elegir Lagarto">
              <span class="pick-emoji">🦎</span>
              <span class="pick-label">Lagarto</span>
            </button>
            <button class="btn btn-pick" data-pick="spock" aria-label="Elegir Spock">
              <span class="pick-emoji">🖖</span>
              <span class="pick-label">Spock</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- ══════════════════ HANDOFF ══════════════════ -->
    <section id="screen-handoff" class="screen" aria-label="Pasar dispositivo">
      <div class="card handoff-card">
        <span class="handoff-icon" aria-hidden="true">📱</span>
        <p class="handoff-msg" id="handoff-msg">Pasa el dispositivo al siguiente jugador</p>
        <p class="handoff-hint">La jugada anterior quedó oculta</p>
        <button id="btn-handoff-ready" class="btn btn-primary btn-lg">Listo →</button>
      </div>
    </section>

    <!-- ══════════════════ RESULT ══════════════════ -->
    <section id="screen-result" class="screen" aria-label="Resultado de ronda">
      <div class="scoreboard">
        <div class="score-block">
          <span class="score-name" id="res-name-p1">J1</span>
          <div class="score-roll" id="res-roll-p1"><span class="score-digit">0</span></div>
        </div>
        <div class="scoreboard-center">
          <span class="round-badge" id="res-round-badge"></span>
        </div>
        <div class="score-block">
          <span class="score-name" id="res-name-p2">J2</span>
          <div class="score-roll" id="res-roll-p2"><span class="score-digit">0</span></div>
        </div>
      </div>

      <div class="card result-card">
        <div class="result-arena">
          <div class="result-pick-block">
            <span class="res-pname" id="res-name-p1-pick"></span>
            <span class="res-emoji" id="res-p1-emoji"></span>
            <span class="res-pick-label" id="res-p1-label"></span>
          </div>
          <div class="result-center-col" style="display:flex;flex-direction:column;align-items:center;gap:var(--sp-1);">
            <div class="result-vs">VS</div>
          </div>
          <div class="result-pick-block">
            <span class="res-pname" id="res-name-p2-pick"></span>
            <span class="res-emoji" id="res-p2-emoji"></span>
            <span class="res-pick-label" id="res-p2-label"></span>
          </div>
        </div>

        <div id="result-banner" class="result-banner" role="status" aria-live="polite"></div>

        <div class="result-actions">
          <button id="btn-next-round"  class="btn btn-primary btn-lg">Siguiente ronda →</button>
          <button id="btn-retry-round" class="btn btn-secondary">↩ Repetir ronda</button>
          <button id="btn-revenge"     class="btn btn-secondary">🔄 Revancha</button>
          <button id="btn-new-game-result" class="btn btn-ghost">Nueva partida</button>
        </div>
      </div>
    </section>

    <!-- ══════════════════ GAME OVER ══════════════════ -->
    <section id="screen-gameover" class="screen" aria-label="Fin de partida">
      <div class="card gameover-card">
        <div class="gameover-trophy" id="go-trophy">🏆</div>
        <h2 class="gameover-title">
          <span id="go-winner-name" class="go-winner-name"></span>
          <span id="go-title-suffix"></span>
        </h2>
        <p class="gameover-subtitle" id="go-subtitle"></p>

        <div class="gameover-score">
          <div class="go-score-block">
            <span class="score-name" id="go-name-p1"></span>
            <span class="go-score-val" id="go-val-p1">0</span>
          </div>
          <span class="go-dash">—</span>
          <div class="go-score-block">
            <span class="score-name" id="go-name-p2"></span>
            <span class="go-score-val" id="go-val-p2">0</span>
          </div>
        </div>

        <div class="gameover-actions">
          <button id="btn-revenge-go" class="btn btn-primary btn-lg">🔄 Revancha</button>
          <button id="btn-new-game-go" class="btn btn-ghost">Nueva partida</button>
          <a href="/rpsls/" class="btn btn-ghost">Cambiar modo</a>
        </div>
      </div>
    </section>

  </div><!-- #app -->

  <script src="/js/game-rpsls-local.js?v=1"></script>
  <script src="/js/audio.js?v=2"></script>
  <script src="/js/ui-rpsls-local.js?v=1"></script>
</body>
</html>
