  <style>
    @keyframes cpuFlipOut {
      from { transform: rotateY(0deg) scale(1); }
      to   { transform: rotateY(90deg) scale(0.8); }
    }
    @keyframes cpuFlipIn {
      from { transform: rotateY(-90deg) scale(0.8); }
      to   { transform: rotateY(0deg) scale(1); }
    }
    @keyframes countdownPop {
      0%   { transform: scale(0.4); opacity: 0; }
      60%  { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes fistPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.3) translateY(-4px); }
      100% { transform: scale(1); }
    }
    .cpu-flip-out  { animation: cpuFlipOut  150ms ease-in  forwards; }
    .cpu-flip-in   { animation: cpuFlipIn   150ms ease-out forwards; }
    .countdown-pop { animation: countdownPop 180ms var(--ease-spring) forwards; }
    .fist-pulse    { animation: fistPulse   200ms var(--ease-out); }
    .cpu-countdown {
      font-size: var(--text-2xl);
      font-weight: 900;
      color: var(--clr-primary-light);
      min-height: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: var(--sp-2);
    }
    .result-center-col { display: flex; flex-direction: column; align-items: center; gap: var(--sp-1); }
    .result-banner.banner-loss { background: rgba(239,68,68,.15); color: var(--clr-danger); }
    .pick-buttons-rpsls { display: flex; flex-direction: column; gap: var(--sp-3); margin: var(--sp-4) 0; }
    .pick-row { display: flex; justify-content: center; gap: var(--sp-3); }
    .pick-row .btn-pick { flex: 1; max-width: 110px; }
    .player-row-single { display: flex; flex-direction: column; gap: var(--sp-2); margin-bottom: var(--sp-6); }
    .player-row-single label { font-size: var(--text-xs); font-weight: 700; color: var(--clr-text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .player-row-single input { background: var(--clr-surface-2); border: 1.5px solid var(--clr-border); border-radius: var(--radius-sm); color: var(--clr-text); font-family: var(--font); font-size: var(--text-base); padding: var(--sp-3) var(--sp-4); outline: none; transition: border-color var(--dur-fast), box-shadow var(--dur-fast); width: 100%; }
    .player-row-single input:focus { border-color: var(--clr-primary); box-shadow: 0 0 0 3px rgba(124,58,237,.25); }
    .back-hub-link { display: block; text-align: center; margin-top: var(--sp-4); font-size: var(--text-sm); color: var(--clr-text-subtle); text-decoration: none; transition: color var(--dur-fast); }
    .back-hub-link:hover { color: var(--clr-text-muted); }
    .session-stats { display: none; background: var(--clr-surface-2); border: 1px solid var(--clr-border); border-radius: var(--radius-sm); padding: var(--sp-5); margin-top: var(--sp-4); }
    .fade-in { animation: fadeIn var(--dur-slow) var(--ease-out) forwards; }
    .session-title { font-size: var(--text-xs); font-weight: 700; color: var(--clr-text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: var(--sp-4); text-align: center; }
    .session-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--sp-3); margin-bottom: var(--sp-3); }
    .stat-item { display: flex; flex-direction: column; align-items: center; gap: var(--sp-1); }
    .stat-val { font-size: var(--text-xl); font-weight: 900; color: var(--clr-primary-light); }
    .stat-label { font-size: var(--text-xs); color: var(--clr-text-subtle); text-align: center; }
    .stat-extra { font-size: var(--text-xs); color: var(--clr-text-muted); text-align: center; }
    .stat-extra strong { color: var(--clr-text); }
    @media (max-width: 400px) { .session-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>

<body>

  <div id="curtain" aria-hidden="true"></div>
  <div id="confetti-container" aria-hidden="true"></div>
  <button id="btn-mute" class="btn-mute" aria-label="Silenciar áudio" title="Silenciar áudio">🔊</button>

  <div id="app">

    <section id="screen-setup" class="screen active" aria-label="Configuração">
      <header class="screen-header">
        <h1 class="game-title"><span class="title-emoji">🖖</span> RPSLS</h1>
        <p class="game-subtitle">Você vs CPU · Pedra Papel Tesoura Lagarto Spock</p>
      </header>
      <div class="card">
        <div class="player-row-single">
          <label for="name-player">Seu nome</label>
          <input id="name-player" type="text" maxlength="20" placeholder="Jogador"
                 autocomplete="off" spellcheck="false" />
        </div>
        <fieldset class="mode-group">
          <legend>Modo de jogo</legend>
          <label class="mode-option">
            <input type="radio" name="mode" value="best-of-3" checked />
            <span class="mode-label">
              <span class="mode-icon">🏆</span>
              <span class="mode-text"><strong>Melhor de 3</strong><small>Primeiro a ganhar 2 rodadas</small></span>
            </span>
          </label>
          <label class="mode-option">
            <input type="radio" name="mode" value="single" />
            <span class="mode-label">
              <span class="mode-icon">⚡</span>
              <span class="mode-text"><strong>Partida única</strong><small>Tudo em uma rodada</small></span>
            </span>
          </label>
        </fieldset>
        <button id="btn-start" class="btn btn-primary btn-lg">Jogar!</button>
      </div>
      <a href="/rpsls/pt/" class="back-hub-link">← Mudar modo</a>
    </section>

    <section id="screen-pick" class="screen" aria-label="Escolha sua jogada">
      <div class="scoreboard">
        <div class="score-block">
          <span class="score-name" id="sb-name-player">Jogador</span>
          <div class="score-roll" id="roll-player"><span class="score-digit">0</span></div>
        </div>
        <div class="scoreboard-center">
          <span class="round-badge" id="pick-round-badge">Rodada 1</span>
        </div>
        <div class="score-block">
          <span class="score-name" id="sb-name-cpu">CPU</span>
          <div class="score-roll" id="roll-cpu"><span class="score-digit">0</span></div>
        </div>
      </div>
      <div class="card pick-card">
        <p class="pick-hint" id="pick-prompt">Escolha sua jogada</p>
        <div class="pick-buttons-rpsls">
          <div class="pick-row">
            <button class="btn btn-pick" data-pick="rock" aria-label="Escolher Pedra">
              <span class="pick-emoji">🪨</span><span class="pick-label">Pedra</span>
            </button>
            <button class="btn btn-pick" data-pick="paper" aria-label="Escolher Papel">
              <span class="pick-emoji">📄</span><span class="pick-label">Papel</span>
            </button>
            <button class="btn btn-pick" data-pick="scissors" aria-label="Escolher Tesoura">
              <span class="pick-emoji">✂️</span><span class="pick-label">Tesoura</span>
            </button>
          </div>
          <div class="pick-row">
            <button class="btn btn-pick" data-pick="lizard" aria-label="Escolher Lagarto">
              <span class="pick-emoji">🦎</span><span class="pick-label">Lagarto</span>
            </button>
            <button class="btn btn-pick" data-pick="spock" aria-label="Escolher Spock">
              <span class="pick-emoji">🖖</span><span class="pick-label">Spock</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <section id="screen-result" class="screen" aria-label="Resultado da rodada">
      <div class="scoreboard">
        <div class="score-block">
          <span class="score-name" id="res-name-player">Jogador</span>
          <div class="score-roll" id="res-roll-player"><span class="score-digit">0</span></div>
        </div>
        <div class="scoreboard-center">
          <span class="round-badge" id="res-round-badge"></span>
        </div>
        <div class="score-block">
          <span class="score-name">CPU</span>
          <div class="score-roll" id="res-roll-cpu"><span class="score-digit">0</span></div>
        </div>
      </div>
      <div class="card result-card">
        <div class="result-arena">
          <div class="result-pick-block">
            <span class="res-pname" id="res-name-player-pick"></span>
            <span class="res-emoji" id="res-player-emoji"></span>
            <span class="res-pick-label" id="res-player-label"></span>
          </div>
          <div class="result-center-col">
            <div class="result-vs">VS</div>
            <div id="cpu-countdown" class="cpu-countdown" aria-live="polite"></div>
          </div>
          <div class="result-pick-block">
            <span class="res-pname">CPU</span>
            <span class="res-emoji" id="res-cpu-emoji">✊</span>
            <span class="res-pick-label" id="res-cpu-label"></span>
          </div>
        </div>
        <div id="result-banner" class="result-banner" role="status" aria-live="polite"></div>
        <div class="result-actions">
          <button id="btn-next-round"      class="btn btn-primary btn-lg">Próxima rodada →</button>
          <button id="btn-retry-round"     class="btn btn-secondary">↩ Repetir rodada</button>
          <button id="btn-revenge"         class="btn btn-secondary">🔄 Revanche</button>
          <button id="btn-new-game-result" class="btn btn-ghost">Nova partida</button>
        </div>
      </div>
    </section>

    <section id="screen-gameover" class="screen" aria-label="Fim de partida">
      <div class="card gameover-card">
        <div class="gameover-trophy" id="go-trophy">🏆</div>
        <h2 class="gameover-title">
          <span id="go-winner-name" class="go-winner-name"></span>
          <span id="go-title-suffix"></span>
        </h2>
        <p class="gameover-subtitle" id="go-subtitle"></p>
        <div class="gameover-score">
          <div class="go-score-block">
            <span class="score-name" id="go-name-player"></span>
            <span class="go-score-val" id="go-val-player">0</span>
          </div>
          <span class="go-dash">—</span>
          <div class="go-score-block">
            <span class="score-name" id="go-name-cpu">CPU</span>
            <span class="go-score-val" id="go-val-cpu">0</span>
          </div>
        </div>
        <div id="session-stats" class="session-stats" aria-label="Estatísticas da sessão">
          <h3 class="session-title">Estatísticas da sessão</h3>
          <div class="session-grid">
            <div class="stat-item"><span class="stat-val" id="stat-matches">0</span><span class="stat-label">Partidas</span></div>
            <div class="stat-item"><span class="stat-val" id="stat-wins">0</span><span class="stat-label">Vitórias</span></div>
            <div class="stat-item"><span class="stat-val" id="stat-losses">0</span><span class="stat-label">Derrotas</span></div>
            <div class="stat-item"><span class="stat-val" id="stat-draws">0</span><span class="stat-label">Empates</span></div>
          </div>
          <p class="stat-extra">% vitória: <strong id="stat-winpct">0%</strong></p>
        </div>
        <div class="gameover-actions">
          <button id="btn-revenge-go"  class="btn btn-primary btn-lg">🔄 Revanche</button>
          <button id="btn-new-game-go" class="btn btn-ghost">Nova partida</button>
          <a href="/rpsls/pt/" class="btn btn-ghost">Mudar modo</a>
        </div>
      </div>
    </section>

  </div>

  <script src="/js/game-rpsls-cpu.js?v=1"></script>
  <script src="/js/audio.js?v=2"></script>
  <script src="/js/ui-rpsls-cpu.js?v=1"></script>
</body>
</html>
