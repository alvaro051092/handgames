  <style>
    .pick-section-label{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--clr-text-muted);margin-bottom:var(--sp-2);text-align:center;}
    .bet-buttons{display:flex;gap:var(--sp-3);justify-content:center;margin-bottom:var(--sp-5);}
    .btn-bet{flex:1;padding:var(--sp-3) var(--sp-4);border:2px solid var(--clr-border);border-radius:var(--radius-sm);background:var(--clr-surface-2);color:var(--clr-text);font-family:var(--font);font-size:var(--text-lg);font-weight:800;cursor:pointer;transition:border-color var(--dur-fast),background var(--dur-fast),color var(--dur-fast);}
    .btn-bet:hover{border-color:var(--clr-primary);background:var(--clr-surface);} .btn-bet.selected{border-color:var(--clr-primary);background:var(--clr-primary);color:#fff;}
    .finger-buttons{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--sp-2);margin-bottom:var(--sp-5);}
    .btn-finger{aspect-ratio:1;border:2px solid var(--clr-border);border-radius:var(--radius-sm);background:var(--clr-surface-2);color:var(--clr-text);font-family:var(--font);font-size:var(--text-xl);font-weight:900;cursor:pointer;transition:border-color var(--dur-fast),background var(--dur-fast),transform var(--dur-fast);}
    .btn-finger:hover{border-color:var(--clr-primary);transform:translateY(-2px);} .btn-finger.selected{border-color:var(--clr-primary);background:var(--clr-primary);color:#fff;}
    .res-finger-num{font-size:3.5rem;font-weight:900;line-height:1;color:var(--clr-primary-light);display:block;margin:var(--sp-2) 0;min-width:2ch;text-align:center;}
    .res-bet-badge{font-size:var(--text-xs);font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:var(--sp-1) var(--sp-3);border-radius:var(--radius-full);display:inline-block;margin-top:var(--sp-1);}
    .res-bet-badge.bet-par{border:1.5px solid #0ea5e9;color:#38bdf8;} .res-bet-badge.bet-impar{border:1.5px solid #a855f7;color:#c084fc;}
    .res-sum{text-align:center;margin-top:var(--sp-2);min-height:2.5rem;}
    .res-sum-value{font-size:var(--text-lg);font-weight:800;color:var(--clr-text);}
    .res-sum-parity{display:inline-block;margin-left:var(--sp-2);font-size:var(--text-sm);font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px var(--sp-2);border-radius:var(--radius-full);}
    .res-sum-parity.par{background:rgba(14,165,233,.18);color:#38bdf8;} .res-sum-parity.impar{background:rgba(168,85,247,.18);color:#c084fc;}
    .back-hub-link{display:block;text-align:center;margin-top:var(--sp-4);font-size:var(--text-sm);color:var(--clr-text-subtle);text-decoration:none;transition:color var(--dur-fast);}
    .back-hub-link:hover{color:var(--clr-text-muted);}
    @media (max-width:400px){.finger-buttons{grid-template-columns:repeat(3,1fr);}}
  </style>

<body>
  <div id="curtain" aria-hidden="true"></div>
  <div id="confetti-container" aria-hidden="true"></div>
  <button id="btn-mute" class="btn-mute" aria-label="Silenciar áudio" title="Silenciar áudio">🔊</button>
  <div id="app">
    <section id="screen-setup" class="screen active" aria-label="Configuração">
      <header class="screen-header">
        <h1 class="game-title"><span class="title-emoji">🎲</span> Par ou Ímpar</h1>
        <p class="game-subtitle">Dois jogadores · Um vencedor</p>
      </header>
      <div class="card">
        <div class="players-row">
          <div class="field"><label for="name-p1">Jogador 1</label><input id="name-p1" type="text" maxlength="20" placeholder="Jogador 1" autocomplete="off" spellcheck="false" /></div>
          <div class="vs-badge">VS</div>
          <div class="field"><label for="name-p2">Jogador 2</label><input id="name-p2" type="text" maxlength="20" placeholder="Jogador 2" autocomplete="off" spellcheck="false" /></div>
        </div>
        <fieldset class="mode-group">
          <legend>Modo de jogo</legend>
          <label class="mode-option"><input type="radio" name="mode" value="best-of-3" checked /><span class="mode-label"><span class="mode-icon">🏆</span><span class="mode-text"><strong>Melhor de 3</strong><small>Primeiro a ganhar 2 rodadas</small></span></span></label>
          <label class="mode-option"><input type="radio" name="mode" value="single" /><span class="mode-label"><span class="mode-icon">⚡</span><span class="mode-text"><strong>Rodada única</strong><small>Tudo em uma só rodada</small></span></span></label>
        </fieldset>
        <button id="btn-start" class="btn btn-primary btn-lg">Começar partida</button>
      </div>
      <a href="/odd-even/pt/" class="back-hub-link">← Mudar modo</a>
    </section>

    <section id="screen-pick" class="screen" aria-label="Escolha de jogada">
      <div class="scoreboard">
        <div class="score-block" id="sb-p1-block"><span class="score-name" id="sb-name-p1">J1</span><div class="score-roll" id="roll-p1"><span class="score-digit">0</span></div></div>
        <div class="scoreboard-center"><span class="round-badge" id="pick-round-badge">Rodada 1</span></div>
        <div class="score-block" id="sb-p2-block"><span class="score-name" id="sb-name-p2">J2</span><div class="score-roll" id="roll-p2"><span class="score-digit">0</span></div></div>
      </div>
      <div class="card pick-card">
        <div class="turn-indicator" id="turn-indicator">
          <span class="turn-avatar" id="turn-avatar">J1</span>
          <p class="turn-text">Vez de <strong id="turn-name">Jogador 1</strong></p>
        </div>
        <p class="pick-hint" id="pick-hint">Escolha sua aposta e seus dedos</p>
        <div id="pick-bet-section">
          <p class="pick-section-label">Sua aposta</p>
          <div class="bet-buttons" id="bet-buttons">
            <button class="btn-bet" data-bet="par" aria-label="Apostar Par">✌️&nbsp; PAR</button>
            <button class="btn-bet" data-bet="impar" aria-label="Apostar Ímpar">☝️&nbsp; ÍMPAR</button>
          </div>
        </div>
        <p class="pick-section-label">Seus dedos (0 – 5)</p>
        <div class="finger-buttons" id="finger-buttons">
          <button class="btn-finger" data-f="0">0</button><button class="btn-finger" data-f="1">1</button>
          <button class="btn-finger" data-f="2">2</button><button class="btn-finger" data-f="3">3</button>
          <button class="btn-finger" data-f="4">4</button><button class="btn-finger" data-f="5">5</button>
        </div>
        <button id="btn-confirm" class="btn btn-primary btn-lg" disabled>Confirmar jogada!</button>
      </div>
    </section>

    <section id="screen-handoff" class="screen" aria-label="Passar dispositivo">
      <div class="card handoff-card">
        <div class="handoff-icon">🤫</div>
        <h2 class="handoff-title">Jogada salva!</h2>
        <p class="handoff-msg">Passe o dispositivo para <strong id="handoff-player">—</strong></p>
        <p class="handoff-sub">Não olhe a tela até ser a sua vez.</p>
        <button id="btn-handoff-ready" class="btn btn-primary btn-lg">Pronto, sou <span id="handoff-ready-name">—</span></button>
      </div>
    </section>

    <section id="screen-result" class="screen" aria-label="Resultado da rodada">
      <div class="scoreboard">
        <div class="score-block"><span class="score-name" id="res-name-p1">J1</span><div class="score-roll" id="res-roll-p1"><span class="score-digit">0</span></div></div>
        <div class="scoreboard-center"><span class="round-badge" id="res-round-badge"></span></div>
        <div class="score-block"><span class="score-name" id="res-name-p2">J2</span><div class="score-roll" id="res-roll-p2"><span class="score-digit">0</span></div></div>
      </div>
      <div class="card result-card">
        <div class="result-arena">
          <div class="result-pick-block" id="res-p1-block">
            <span class="res-pname" id="res-p1-name"></span>
            <span class="res-finger-num" id="res-p1-num">0</span>
            <span class="res-bet-badge" id="res-p1-bet"></span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:var(--sp-1)">
            <div class="result-vs">+</div>
            <div id="res-sum" class="res-sum" style="opacity:0">
              <span class="res-sum-value" id="res-sum-value"></span>
              <span class="res-sum-parity" id="res-sum-parity"></span>
            </div>
          </div>
          <div class="result-pick-block" id="res-p2-block">
            <span class="res-pname" id="res-p2-name"></span>
            <span class="res-finger-num" id="res-p2-num">0</span>
          </div>
        </div>
        <div id="result-banner" class="result-banner" role="status" aria-live="polite"></div>
        <div class="result-actions">
          <button id="btn-next-round" class="btn btn-primary btn-lg">Próxima rodada →</button>
          <button id="btn-revenge" class="btn btn-secondary">🔄 Revanche</button>
          <button id="btn-new-game-result" class="btn btn-ghost">Nova partida</button>
        </div>
      </div>
    </section>

    <section id="screen-gameover" class="screen" aria-label="Fim de jogo">
      <div class="card gameover-card">
        <div class="gameover-trophy" id="go-trophy">🏆</div>
        <h2 class="gameover-title"><span id="go-winner-name" class="go-winner-name"></span><span id="go-title-suffix"></span></h2>
        <p class="gameover-subtitle" id="go-subtitle"></p>
        <div class="gameover-score">
          <div class="go-score-block"><span class="score-name" id="go-name-p1"></span><span class="go-score-val" id="go-val-p1">0</span></div>
          <span class="go-dash">—</span>
          <div class="go-score-block"><span class="score-name" id="go-name-p2"></span><span class="go-score-val" id="go-val-p2">0</span></div>
        </div>
        <div class="gameover-actions">
          <button id="btn-revenge-go" class="btn btn-primary btn-lg">🔄 Revanche</button>
          <button id="btn-new-game-go" class="btn btn-ghost">Nova partida</button>
          <a href="/odd-even/pt/" class="btn btn-ghost">Mudar modo</a>
        </div>
      </div>
    </section>
  </div>
  <script src="/js/game-ooe-local.js?v=1"></script>
  <script src="/js/audio.js?v=2"></script>
  <script src="/js/ui-ooe-local.js?v=1"></script>
</body>
</html>
