  <link rel="icon" type="image/svg+xml"  href="/assets/favicon.svg" />
  <link rel="icon" type="image/x-icon"  href="/assets/favicon.ico" />

  <link rel="stylesheet" href="/css/layout.css?v=3" />
  <link rel="stylesheet" href="/css/components.css?v=3" />
  <link rel="stylesheet" href="/css/animations.css?v=3" />
  <style>
    @keyframes cpuFlipOut{from{transform:rotateY(0deg) scale(1);}to{transform:rotateY(90deg) scale(0.8);}}
    @keyframes cpuFlipIn{from{transform:rotateY(-90deg) scale(0.8);}to{transform:rotateY(0deg) scale(1);}}
    @keyframes countdownPop{0%{transform:scale(0.4);opacity:0;}60%{transform:scale(1.3);opacity:1;}100%{transform:scale(1);opacity:1;}}
    @keyframes fistPulse{0%{transform:scale(1);}40%{transform:scale(1.3) translateY(-4px);}100%{transform:scale(1);}}
    .cpu-flip-out{animation:cpuFlipOut 150ms ease-in forwards;}.cpu-flip-in{animation:cpuFlipIn 150ms ease-out forwards;}
    .countdown-pop{animation:countdownPop 180ms var(--ease-spring) forwards;}.fist-pulse{animation:fistPulse 200ms var(--ease-out);}
    .battle-arena{display:flex;align-items:center;justify-content:space-around;gap:var(--sp-3);padding:var(--sp-4) 0 var(--sp-2);overflow:hidden;}
    .battle-pick-block{display:flex;flex-direction:column;align-items:center;gap:var(--sp-2);flex:1;will-change:transform,opacity;}
    .battle-pick-block.loser{animation:loserFade var(--dur-slow) var(--ease-out) forwards;}
    .battle-num{font-size:4rem;font-weight:900;line-height:1;color:var(--clr-primary-light);display:block;min-width:1.2ch;text-align:center;cursor:default;user-select:none;}
    .battle-pick-label{font-size:var(--text-xs);color:var(--clr-text-muted);min-height:1.1em;}
    .battle-center-col{display:flex;flex-direction:column;align-items:center;gap:var(--sp-1);}
    .battle-countdown{font-size:var(--text-2xl);font-weight:900;color:var(--clr-primary-light);min-height:2.2rem;display:flex;align-items:center;justify-content:center;}
    .battle-bet-display{font-size:var(--text-base);font-weight:800;text-align:center;padding:var(--sp-2) var(--sp-4);border-radius:var(--radius-sm);margin-bottom:var(--sp-3);min-height:2rem;opacity:0;}
    .battle-bet-display.bet-par{background:rgba(14,165,233,.18);color:#38bdf8;}.battle-bet-display.bet-impar{background:rgba(168,85,247,.18);color:#c084fc;}
    .battle-sum{text-align:center;margin-top:var(--sp-2);min-height:2.5rem;}
    .battle-sum-value{font-size:var(--text-lg);font-weight:800;color:var(--clr-text);}
    .res-sum-parity{display:inline-block;margin-left:var(--sp-2);font-size:var(--text-sm);font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px var(--sp-2);border-radius:var(--radius-full);}
    .res-sum-parity.par{background:rgba(14,165,233,.18);color:#38bdf8;}.res-sum-parity.impar{background:rgba(168,85,247,.18);color:#c084fc;}
    .btn-reveal-main{background:linear-gradient(135deg,var(--clr-primary),#9333ea);color:#fff;font-size:var(--text-lg);font-weight:800;border-radius:var(--radius-sm);padding:var(--sp-4) var(--sp-6);border:none;cursor:pointer;width:100%;min-height:56px;display:flex;align-items:center;justify-content:center;gap:var(--sp-2);transition:filter var(--dur-fast) var(--ease-out),transform var(--dur-fast) var(--ease-out),box-shadow var(--dur-fast) var(--ease-out);position:relative;overflow:hidden;}
    .btn-reveal-main:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,.5);}
    .btn-reveal-main:active{transform:translateY(1px);box-shadow:none;}
    .back-hub-link{display:block;text-align:center;margin-top:var(--sp-4);font-size:var(--text-sm);color:var(--clr-text-subtle);text-decoration:none;transition:color var(--dur-fast);}
    .back-hub-link:hover{color:var(--clr-text-muted);}
  </style>
</head>
<body>
  <div id="curtain" aria-hidden="true"></div>
  <div id="confetti-container" aria-hidden="true"></div>
  <button id="btn-mute" class="btn-mute" aria-label="Mute audio" title="Mute audio">🔊</button>
  <div id="app">
    <section id="screen-setup" class="screen active" aria-label="Setup">
      <header class="screen-header">
        <h1 class="game-title"><span class="title-emoji">⚔️</span> Battle</h1>
        <p class="game-subtitle">CPU bets and picks for both · May the luckiest win!</p>
      </header>
      <div class="card">
        <div class="players-row">
          <div class="field"><label for="name-p1">Player 1</label><input id="name-p1" type="text" maxlength="20" placeholder="Player 1" autocomplete="off" spellcheck="false" /></div>
          <div class="vs-badge">VS</div>
          <div class="field"><label for="name-p2">Player 2</label><input id="name-p2" type="text" maxlength="20" placeholder="Player 2" autocomplete="off" spellcheck="false" /></div>
        </div>
        <fieldset class="mode-group">
          <legend>Game mode</legend>
          <label class="mode-option"><input type="radio" name="mode" value="best-of-3" checked /><span class="mode-label"><span class="mode-icon">🏆</span><span class="mode-text"><strong>Best of 3</strong><small>First to win 2 rounds</small></span></span></label>
          <label class="mode-option"><input type="radio" name="mode" value="single" /><span class="mode-label"><span class="mode-icon">⚡</span><span class="mode-text"><strong>Single round</strong><small>Everything in one shot</small></span></span></label>
        </fieldset>
        <button id="btn-start" class="btn btn-primary btn-lg">Start battle!</button>
      </div>
      <a href="/odd-even/en/" class="back-hub-link">← Change mode</a>
    </section>

    <section id="screen-battle" class="screen" aria-label="Battle">
      <div class="scoreboard">
        <div class="score-block"><span class="score-name" id="battle-name-p1">P1</span><div class="score-roll" id="battle-roll-p1"><span class="score-digit">0</span></div></div>
        <div class="scoreboard-center"><span class="round-badge" id="battle-round-badge">Round 1</span></div>
        <div class="score-block"><span class="score-name" id="battle-name-p2">P2</span><div class="score-roll" id="battle-roll-p2"><span class="score-digit">0</span></div></div>
      </div>
      <div class="card" style="text-align:center;overflow:visible;">
        <div id="battle-bet-display" class="battle-bet-display" aria-live="polite"></div>
        <div class="battle-arena">
          <div class="battle-pick-block" id="battle-p1-block"><span class="battle-num" id="battle-p1-num">?</span><span class="battle-pick-label" id="battle-p1-label"></span></div>
          <div class="battle-center-col"><span class="result-vs">+</span><div id="battle-countdown" class="battle-countdown" aria-live="polite"></div></div>
          <div class="battle-pick-block" id="battle-p2-block"><span class="battle-num" id="battle-p2-num">?</span><span class="battle-pick-label" id="battle-p2-label"></span></div>
        </div>
        <div id="battle-sum" class="battle-sum" style="opacity:0">
          <span class="battle-sum-value" id="battle-sum-value"></span>
          <span class="res-sum-parity" id="battle-sum-parity"></span>
        </div>
        <div id="battle-banner" class="result-banner" role="status" aria-live="polite"></div>
        <div class="result-actions" style="margin-top:var(--sp-5);">
          <button id="btn-reveal" class="btn-reveal-main">⚔️&nbsp; Reveal!</button>
          <button id="btn-next-round" class="btn btn-primary btn-lg" style="display:none">Next round →</button>
          <button id="btn-revenge" class="btn btn-secondary" style="display:none">🔄 Rematch</button>
          <button id="btn-new-game-battle" class="btn btn-ghost" style="display:none">New game</button>
        </div>
      </div>
    </section>

    <section id="screen-gameover" class="screen" aria-label="Game over">
      <div class="card gameover-card">
        <div class="gameover-trophy" id="go-trophy">🏆</div>
        <h2 class="gameover-title"><span id="go-winner-name" class="go-winner-name"></span><span id="go-title-suffix"></span></h2>
        <p class="gameover-subtitle" id="go-subtitle"></p>
        <div class="gameover-score">
          <div class="go-score-block"><span class="score-name" id="go-name-p1"></span><span class="go-score-val" id="go-val-p1">0</span></div>
          <span class="go-dash">—</span>
          <div class="go-score-block"><span class="score-name" id="go-name-p2"></span><span class="go-score-val" id="go-val-p2">0</span></div>
        </div>
        <div class="gameover-actions">
          <button id="btn-revenge-go" class="btn btn-primary btn-lg">🔄 Rematch</button>
          <button id="btn-new-game-go" class="btn btn-ghost">New game</button>
          <a href="/odd-even/en/" class="btn btn-ghost">Change mode</a>
        </div>
      </div>
    </section>
  </div>
  <script src="/js/game-ooe-battle.js?v=1"></script>
  <script src="/js/audio.js?v=2"></script>
  <script src="/js/ui-ooe-battle.js?v=1"></script>
</body>
</html>
