<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <title>Odd or Even — 2 Players on the Same Device</title>
  <meta name="description" content="Play odd or even with a friend on the same device. Player 1 bets odd or even and picks fingers; Player 2 picks theirs. Best of 3." />
  <link rel="canonical"      href="https://handgames.app/odd-even/en/local.html" />
  <link rel="alternate" hreflang="es"        href="https://handgames.app/odd-even/local.html" />
  <link rel="alternate" hreflang="en"        href="https://handgames.app/odd-even/en/local.html" />
  <link rel="alternate" hreflang="pt"        href="https://handgames.app/odd-even/pt/local.html" />
  <link rel="alternate" hreflang="x-default" href="https://handgames.app/odd-even/local.html" />
  <meta property="og:type" content="website" />
  <meta property="og:url"  content="https://handgames.app/odd-even/en/local.html" />
  <meta property="og:title" content="Odd or Even — 2 Players on the Same Device" />
  <meta property="og:description" content="Player 1 bets odd or even and picks fingers; Player 2 picks theirs. Best of 3." />
  <meta property="og:image" content="https://handgames.app/assets/og-image.png" />
  <meta property="og:locale" content="en_US" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Odd or Even — 2 Players on the Same Device" />
  <meta name="twitter:description" content="Player 1 bets odd or even and picks fingers; Player 2 picks theirs. Best of 3." />
  <meta name="twitter:image" content="https://handgames.app/assets/og-image.png" />
  <link rel="icon" type="image/svg+xml"  href="/assets/favicon.svg" />
  <link rel="icon" type="image/x-icon"  href="/assets/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="/css/tokens.css?v=3" />
  <link rel="stylesheet" href="/css/layout.css?v=3" />
  <link rel="stylesheet" href="/css/components.css?v=3" />
  <link rel="stylesheet" href="/css/animations.css?v=3" />
  <style>
    .pick-section-label{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--clr-text-muted);margin-bottom:var(--sp-2);text-align:center;}
    .bet-buttons{display:flex;gap:var(--sp-3);justify-content:center;margin-bottom:var(--sp-5);}
    .btn-bet{flex:1;padding:var(--sp-3) var(--sp-4);border:2px solid var(--clr-border);border-radius:var(--radius-sm);background:var(--clr-surface-2);color:var(--clr-text);font-family:var(--font);font-size:var(--text-lg);font-weight:800;cursor:pointer;transition:border-color var(--dur-fast),background var(--dur-fast),color var(--dur-fast);}
    .btn-bet:hover{border-color:var(--clr-primary);background:var(--clr-surface);} .btn-bet.selected{border-color:var(--clr-primary);background:var(--clr-primary);color:#fff;}
    .finger-buttons{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--sp-2);margin-bottom:var(--sp-5);}
    .btn-finger{aspect-ratio:1;border:2px solid var(--clr-border);border-radius:var(--radius-sm);background:var(--clr-surface-2);color:var(--clr-text);font-family:var(--font);font-size:var(--text-xl);font-weight:900;cursor:pointer;transition:border-color var(--dur-fast),background var(--dur-fast),transform var(--dur-fast);}
    .btn-finger:hover{border-color:var(--clr-primary);transform:translateY(-2px);} .btn-finger.selected{border-color:var(--clr-primary);background:var(--clr-primary);color:#fff;}
    .res-finger-num{font-size:3.5rem;font-weight:900;line-height:1;color:var(--clr-primary-light);display:block;margin:var(--sp-2) 0;min-width:2ch;text-align:center;}
    .res-bet-badge{font-size:var(--text-xs);font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:var(--sp-1) var(--sp-3);border-radius:var(--radius-full);display:inline-block;margin-top:var(--sp-1);}
    .res-bet-badge.bet-par{border:1.5px solid #0ea5e9;color:#38bdf8;} .res-bet-badge.bet-impar{border:1.5px solid #a855f7;color:#c084fc;}
    .res-sum{text-align:center;margin-top:var(--sp-2);min-height:2.5rem;}
    .res-sum-value{font-size:var(--text-lg);font-weight:800;color:var(--clr-text);}
    .res-sum-parity{display:inline-block;margin-left:var(--sp-2);font-size:var(--text-sm);font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px var(--sp-2);border-radius:var(--radius-full);}
    .res-sum-parity.par{background:rgba(14,165,233,.18);color:#38bdf8;} .res-sum-parity.impar{background:rgba(168,85,247,.18);color:#c084fc;}
    .back-hub-link{display:block;text-align:center;margin-top:var(--sp-4);font-size:var(--text-sm);color:var(--clr-text-subtle);text-decoration:none;transition:color var(--dur-fast);}
    .back-hub-link:hover{color:var(--clr-text-muted);}
    @media (max-width:400px){.finger-buttons{grid-template-columns:repeat(3,1fr);}}
  </style>
</head>
<body>
  <div id="curtain" aria-hidden="true"></div>
  <div id="confetti-container" aria-hidden="true"></div>
  <button id="btn-mute" class="btn-mute" aria-label="Mute audio" title="Mute audio">🔊</button>
  <div id="app">
    <section id="screen-setup" class="screen active" aria-label="Setup">
      <header class="screen-header">
        <h1 class="game-title"><span class="title-emoji">🎲</span> Odd or Even</h1>
        <p class="game-subtitle">Two players · One winner</p>
      </header>
      <div class="card">
        <div class="players-row">
          <div class="field"><label for="name-p1">Player 1</label><input id="name-p1" type="text" maxlength="20" placeholder="Player 1" autocomplete="off" spellcheck="false" /></div>
          <div class="vs-badge">VS</div>
          <div class="field"><label for="name-p2">Player 2</label><input id="name-p2" type="text" maxlength="20" placeholder="Player 2" autocomplete="off" spellcheck="false" /></div>
        </div>
        <fieldset class="mode-group">
          <legend>Game mode</legend>
          <label class="mode-option"><input type="radio" name="mode" value="best-of-3" checked /><span class="mode-label"><span class="mode-icon">🏆</span><span class="mode-text"><strong>Best of 3</strong><small>First to win 2 rounds</small></span></span></label>
          <label class="mode-option"><input type="radio" name="mode" value="single" /><span class="mode-label"><span class="mode-icon">⚡</span><span class="mode-text"><strong>Single round</strong><small>Everything in one shot</small></span></span></label>
        </fieldset>
        <button id="btn-start" class="btn btn-primary btn-lg">Start game</button>
      </div>
      <a href="/odd-even/en/" class="back-hub-link">← Change mode</a>
    </section>

    <section id="screen-pick" class="screen" aria-label="Pick">
      <div class="scoreboard">
        <div class="score-block" id="sb-p1-block"><span class="score-name" id="sb-name-p1">P1</span><div class="score-roll" id="roll-p1"><span class="score-digit">0</span></div></div>
        <div class="scoreboard-center"><span class="round-badge" id="pick-round-badge">Round 1</span></div>
        <div class="score-block" id="sb-p2-block"><span class="score-name" id="sb-name-p2">P2</span><div class="score-roll" id="roll-p2"><span class="score-digit">0</span></div></div>
      </div>
      <div class="card pick-card">
        <div class="turn-indicator" id="turn-indicator">
          <span class="turn-avatar" id="turn-avatar">P1</span>
          <p class="turn-text">Turn of <strong id="turn-name">Player 1</strong></p>
        </div>
        <p class="pick-hint" id="pick-hint">Choose your bet and fingers</p>
        <div id="pick-bet-section">
          <p class="pick-section-label">Your bet</p>
          <div class="bet-buttons" id="bet-buttons">
            <button class="btn-bet" data-bet="par" aria-label="Bet Even">✌️&nbsp; EVEN</button>
            <button class="btn-bet" data-bet="impar" aria-label="Bet Odd">☝️&nbsp; ODD</button>
          </div>
        </div>
        <p class="pick-section-label">Your fingers (0 – 5)</p>
        <div class="finger-buttons" id="finger-buttons">
          <button class="btn-finger" data-f="0">0</button><button class="btn-finger" data-f="1">1</button>
          <button class="btn-finger" data-f="2">2</button><button class="btn-finger" data-f="3">3</button>
          <button class="btn-finger" data-f="4">4</button><button class="btn-finger" data-f="5">5</button>
        </div>
        <button id="btn-confirm" class="btn btn-primary btn-lg" disabled>Confirm pick!</button>
      </div>
    </section>

    <section id="screen-handoff" class="screen" aria-label="Pass device">
      <div class="card handoff-card">
        <div class="handoff-icon">🤫</div>
        <h2 class="handoff-title">Pick saved!</h2>
        <p class="handoff-msg">Pass the device to <strong id="handoff-player">—</strong></p>
        <p class="handoff-sub">Don't look at the screen until it's your turn.</p>
        <button id="btn-handoff-ready" class="btn btn-primary btn-lg">Ready, I'm <span id="handoff-ready-name">—</span></button>
      </div>
    </section>

    <section id="screen-result" class="screen" aria-label="Round result">
      <div class="scoreboard">
        <div class="score-block"><span class="score-name" id="res-name-p1">P1</span><div class="score-roll" id="res-roll-p1"><span class="score-digit">0</span></div></div>
        <div class="scoreboard-center"><span class="round-badge" id="res-round-badge"></span></div>
        <div class="score-block"><span class="score-name" id="res-name-p2">P2</span><div class="score-roll" id="res-roll-p2"><span class="score-digit">0</span></div></div>
      </div>
      <div class="card result-card">
        <div class="result-arena">
          <div class="result-pick-block" id="res-p1-block">
            <span class="res-pname" id="res-p1-name"></span>
            <span class="res-finger-num" id="res-p1-num">0</span>
            <span class="res-bet-badge" id="res-p1-bet"></span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:var(--sp-1)">
            <div class="result-vs">+</div>
            <div id="res-sum" class="res-sum" style="opacity:0">
              <span class="res-sum-value" id="res-sum-value"></span>
              <span class="res-sum-parity" id="res-sum-parity"></span>
            </div>
          </div>
          <div class="result-pick-block" id="res-p2-block">
            <span class="res-pname" id="res-p2-name"></span>
            <span class="res-finger-num" id="res-p2-num">0</span>
          </div>
        </div>
        <div id="result-banner" class="result-banner" role="status" aria-live="polite"></div>
        <div class="result-actions">
          <button id="btn-next-round" class="btn btn-primary btn-lg">Next round →</button>
          <button id="btn-revenge" class="btn btn-secondary">🔄 Rematch</button>
          <button id="btn-new-game-result" class="btn btn-ghost">New game</button>
        </div>
      </div>
    </section>

    <section id="screen-gameover" class="screen" aria-label="Game over">
      <div class="card gameover-card">
        <div class="gameover-trophy" id="go-trophy">🏆</div>
        <h2 class="gameover-title"><span id="go-winner-name" class="go-winner-name"></span><span id="go-title-suffix"></span></h2>
        <p class="gameover-subtitle" id="go-subtitle"></p>
        <div class="gameover-score">
          <div class="go-score-block"><span class="score-name" id="go-name-p1"></span><span class="go-score-val" id="go-val-p1">0</span></div>
          <span class="go-dash">—</span>
          <div class="go-score-block"><span class="score-name" id="go-name-p2"></span><span class="go-score-val" id="go-val-p2">0</span></div>
        </div>
        <div class="gameover-actions">
          <button id="btn-revenge-go" class="btn btn-primary btn-lg">🔄 Rematch</button>
          <button id="btn-new-game-go" class="btn btn-ghost">New game</button>
          <a href="/odd-even/en/" class="btn btn-ghost">Change mode</a>
        </div>
      </div>
    </section>
  </div>
  <script src="/js/game-ooe-local.js?v=1"></script>
  <script src="/js/audio.js?v=2"></script>
  <script src="/js/ui-ooe-local.js?v=1"></script>
</body>
</html>
