  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Rock Paper Scissors — 2 Players",
    "alternateName": ["Piedra Papel Tijeras 2 Jugadores", "Pedra Papel Tesoura 2 Jogadores"],
    "url": "https://handgames.app/rps/en/local.html",
    "description": "2-player mode on the same device. Take turns, best of 3.",
    "applicationCategory": "GameApplication",
    "operatingSystem": "Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "inLanguage": ["en", "es", "pt"],
    "genre": "Casual game"
  }
  </script>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon"  href="/assets/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
  <link rel="apple-touch-icon"          href="/assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="/css/tokens.css?v=3" />
  <link rel="stylesheet" href="/css/layout.css?v=3" />
  <link rel="stylesheet" href="/css/components.css?v=3" />
  <link rel="stylesheet" href="/css/animations.css?v=3" />
  <style>
    .back-hub-link {
      display: block;
      text-align: center;
      margin-top: var(--sp-4);
      font-size: var(--text-sm);
      color: var(--clr-text-subtle);
      text-decoration: none;
      transition: color var(--dur-fast);
    }
    .back-hub-link:hover { color: var(--clr-text-muted); }
  </style>
  <!-- Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XM1YK1TG5W"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-XM1YK1TG5W');</script>

</head>
<body>

  <!-- Fixed overlays -->
  <div id="curtain" aria-hidden="true"></div>
  <div id="confetti-container" aria-hidden="true"></div>
  <button id="btn-mute" class="btn-mute" aria-label="Mute audio" title="Mute audio">🔊</button>

  <div id="app">

    <!-- ══════════════════ SETUP ══════════════════ -->
    <section id="screen-setup" class="screen active" aria-label="Setup">
      <header class="screen-header">
        <h1 class="game-title"><span class="title-emoji">✂️</span> Rock · Paper · Scissors</h1>
        <p class="game-subtitle">Two players · One winner</p>
      </header>

      <div class="card">
        <div class="players-row">
          <div class="field">
            <label for="name-p1">Player 1</label>
            <input id="name-p1" type="text" maxlength="20" placeholder="Player 1"
                   autocomplete="off" spellcheck="false" />
          </div>
          <div class="vs-badge">VS</div>
          <div class="field">
            <label for="name-p2">Player 2</label>
            <input id="name-p2" type="text" maxlength="20" placeholder="Player 2"
                   autocomplete="off" spellcheck="false" />
          </div>
        </div>

        <fieldset class="mode-group">
          <legend>Game mode</legend>
          <label class="mode-option">
            <input type="radio" name="mode" value="best-of-3" checked />
            <span class="mode-label">
              <span class="mode-icon">🏆</span>
              <span class="mode-text">
                <strong>Best of 3</strong>
                <small>First to win 2 rounds</small>
              </span>
            </span>
          </label>
          <label class="mode-option">
            <input type="radio" name="mode" value="single" />
            <span class="mode-label">
              <span class="mode-icon">⚡</span>
              <span class="mode-text">
                <strong>Single round</strong>
                <small>Winner takes all in one round</small>
              </span>
            </span>
          </label>
        </fieldset>

        <button id="btn-start" class="btn btn-primary btn-lg">Start game</button>
      </div>

      <a href="/rps/en/" class="back-hub-link">← Change mode</a>
    </section>

    <!-- ══════════════════ PICK ══════════════════ -->
    <section id="screen-pick" class="screen" aria-label="Pick your move">
      <div class="scoreboard">
        <div class="score-block" id="sb-p1-block">
          <span class="score-name" id="sb-name-p1">P1</span>
          <div class="score-roll" id="roll-p1"><span class="score-digit">0</span></div>
        </div>
        <div class="scoreboard-center">
          <span class="round-badge" id="pick-round-badge">Round 1</span>
        </div>
        <div class="score-block" id="sb-p2-block">
          <span class="score-name" id="sb-name-p2">P2</span>
          <div class="score-roll" id="roll-p2"><span class="score-digit">0</span></div>
        </div>
      </div>

      <div class="card pick-card">
        <div class="turn-indicator" id="turn-indicator">
          <span class="turn-avatar" id="turn-avatar">P1</span>
          <p class="turn-text">Turn of <strong id="turn-name">Player 1</strong></p>
        </div>
        <p class="pick-hint">Choose your move</p>
        <div class="pick-buttons" id="pick-buttons">
          <button class="btn btn-pick" data-pick="rock" aria-label="Choose Rock">
            <span class="pick-emoji">🪨</span>
            <span class="pick-label">Rock</span>
          </button>
          <button class="btn btn-pick" data-pick="paper" aria-label="Choose Paper">
            <span class="pick-emoji">📄</span>
            <span class="pick-label">Paper</span>
          </button>
          <button class="btn btn-pick" data-pick="scissors" aria-label="Choose Scissors">
            <span class="pick-emoji">✂️</span>
            <span class="pick-label">Scissors</span>
          </button>
        </div>
      </div>
    </section>

    <!-- ══════════════════ HANDOFF ══════════════════ -->
    <section id="screen-handoff" class="screen" aria-label="Pass the device">
      <div class="card handoff-card">
        <div class="handoff-icon">🤫</div>
        <h2 class="handoff-title">Move saved!</h2>
        <p class="handoff-msg">Pass the device to <strong id="handoff-player">—</strong></p>
        <p class="handoff-sub">Don't look at the screen until it's your turn.</p>
        <button id="btn-handoff-ready" class="btn btn-primary btn-lg">
          Ready, I'm <span id="handoff-ready-name">—</span>
        </button>
      </div>
    </section>

    <!-- ══════════════════ RESULT ══════════════════ -->
    <section id="screen-result" class="screen" aria-label="Round result">
      <div class="scoreboard">
        <div class="score-block">
          <span class="score-name" id="res-name-p1">P1</span>
          <div class="score-roll" id="res-roll-p1"><span class="score-digit">0</span></div>
        </div>
        <div class="scoreboard-center">
          <span class="round-badge" id="res-round-badge"></span>
        </div>
        <div class="score-block">
          <span class="score-name" id="res-name-p2">P2</span>
          <div class="score-roll" id="res-roll-p2"><span class="score-digit">0</span></div>
        </div>
      </div>

      <div class="card result-card">
        <div class="result-arena">
          <div class="result-pick-block" id="res-p1-block">
            <span class="res-pname" id="res-p1-name"></span>
            <span class="res-emoji" id="res-p1-emoji"></span>
            <span class="res-pick-label" id="res-p1-label"></span>
          </div>
          <div class="result-vs">VS</div>
          <div class="result-pick-block" id="res-p2-block">
            <span class="res-pname" id="res-p2-name"></span>
            <span class="res-emoji" id="res-p2-emoji"></span>
            <span class="res-pick-label" id="res-p2-label"></span>
          </div>
        </div>

        <div id="result-banner" class="result-banner" role="status" aria-live="polite"></div>

        <div class="result-actions">
          <button id="btn-next-round" class="btn btn-primary btn-lg">Next round →</button>
          <button id="btn-revenge" class="btn btn-secondary">🔄 Rematch</button>
          <button id="btn-new-game-result" class="btn btn-ghost">New game</button>
        </div>
      </div>
    </section>

    <!-- ══════════════════ GAME OVER ══════════════════ -->
    <section id="screen-gameover" class="screen" aria-label="Game over">
      <div class="card gameover-card">
        <div class="gameover-trophy" id="go-trophy">🏆</div>
        <h2 class="gameover-title">
          <span id="go-winner-name" class="go-winner-name"></span>
          <span id="go-title-suffix"></span>
        </h2>
        <p class="gameover-subtitle" id="go-subtitle"></p>

        <div class="gameover-score">
          <div class="go-score-block">
            <span class="score-name" id="go-name-p1"></span>
            <span class="go-score-val" id="go-val-p1">0</span>
          </div>
          <span class="go-dash">—</span>
          <div class="go-score-block">
            <span class="score-name" id="go-name-p2"></span>
            <span class="go-score-val" id="go-val-p2">0</span>
          </div>
        </div>

        <div class="gameover-actions">
          <button id="btn-revenge-go" class="btn btn-primary btn-lg">🔄 Rematch</button>
          <button id="btn-new-game-go" class="btn btn-ghost">New game</button>
          <a href="/rps/en/" class="btn btn-ghost">Change mode</a>
        </div>
      </div>
    </section>

  </div><!-- #app -->

  <script src="/js/game-local.js?v=2"></script>
  <script src="/js/audio.js?v=2"></script>
  <script src="/js/ui-local.js?v=2"></script>
</body>
</html>
