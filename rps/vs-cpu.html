<!DOCTYPE html>

<head>

  <!-- Open Graph -->

  <meta property="og:description"      content="Enfréntate a la CPU en piedra papel tijeras. Conteo 3-2-1, estadísticas de sesión y mejor de 3." />
  <meta property="og:image"            content="https://handgames.app/assets/og-image.png" />
  <meta property="og:locale"           content="es_ES" />
  <meta property="og:locale:alternate" content="en_US" />
  <meta property="og:locale:alternate" content="pt_BR" />
  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Piedra Papel Tijeras vs CPU — Juega contra la computadora" />
  <meta name="twitter:description" content="Enfréntate a la CPU en piedra papel tijeras. Conteo 3-2-1, estadísticas de sesión y mejor de 3." />
  <meta name="twitter:image"       content="https://handgames.app/assets/og-image.png" />
  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Piedra Papel Tijeras vs CPU",
    "alternateName": ["Rock Paper Scissors vs Computer", "Pedra Papel Tesoura vs Computador"],
    "url": "https://handgames.app/rps/vs-cpu.html",
    "description": "Modo vs CPU con conteo 3-2-1, estadísticas de sesión y mejor de 3.",
    "applicationCategory": "GameApplication",
    "operatingSystem": "Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "inLanguage": ["es", "en", "pt"],
    "genre": "Casual game"
  }
  </script>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon"  href="/assets/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
  <link rel="apple-touch-icon"          href="/assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="/css/tokens.css?v=3" />
  <link rel="stylesheet" href="/css/layout.css?v=3" />
  <link rel="stylesheet" href="/css/components.css?v=3" />
  <link rel="stylesheet" href="/css/animations.css?v=3" />
  <style>
    /* ── CPU flip animations ── */
    @keyframes cpuFlipOut {
      from { transform: rotateY(0deg) scale(1); }
      to   { transform: rotateY(90deg) scale(0.8); }
    }
    @keyframes cpuFlipIn {
      from { transform: rotateY(-90deg) scale(0.8); }
      to   { transform: rotateY(0deg) scale(1); }
    }
    @keyframes countdownPop {
      0%   { transform: scale(0.4); opacity: 0; }
      60%  { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes fistPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.3) translateY(-4px); }
      100% { transform: scale(1); }
    }

    .cpu-flip-out  { animation: cpuFlipOut  150ms ease-in  forwards; }
    .cpu-flip-in   { animation: cpuFlipIn   150ms ease-out forwards; }
    .countdown-pop { animation: countdownPop 180ms var(--ease-spring) forwards; }
    .fist-pulse    { animation: fistPulse   200ms var(--ease-out); }

    /* ── CPU countdown display ── */
    .cpu-countdown {
      font-size: var(--text-2xl);
      font-weight: 900;
      color: var(--clr-primary-light);
      min-height: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: var(--sp-2);
    }

    /* ── Result center column ── */
    .result-center-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-1);
    }

    /* ── Banner loss variant ── */
    .result-banner.banner-loss {
      background: rgba(239,68,68,.15);
      color: var(--clr-danger);
    }

    /* ── Setup: single player row ── */
    .player-row-single {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      margin-bottom: var(--sp-6);
    }

    .player-row-single label {
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--clr-text-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .player-row-single input {
      background: var(--clr-surface-2);
      border: 1.5px solid var(--clr-border);
      border-radius: var(--radius-sm);
      color: var(--clr-text);
      font-family: var(--font);
      font-size: var(--text-base);
      padding: var(--sp-3) var(--sp-4);
      outline: none;
      transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
      width: 100%;
    }

    .player-row-single input:focus {
      border-color: var(--clr-primary);
      box-shadow: 0 0 0 3px rgba(124,58,237,.25);
    }

    /* ── Back to hub link ── */
    .back-hub-link {
      display: block;
      text-align: center;
      margin-top: var(--sp-4);
      font-size: var(--text-sm);
      color: var(--clr-text-subtle);
      text-decoration: none;
      transition: color var(--dur-fast);
    }
    .back-hub-link:hover { color: var(--clr-text-muted); }

    /* ── Session statistics ── */
    .session-stats {
      display: none;
      background: var(--clr-surface-2);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-sm);
      padding: var(--sp-5);
      margin-top: var(--sp-4);
    }
    .fade-in { animation: fadeIn var(--dur-slow) var(--ease-out) forwards; }

    .session-title {
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--clr-text-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: var(--sp-4);
      text-align: center;
    }

    .session-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--sp-3);
      margin-bottom: var(--sp-4);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-1);
    }

    .stat-val {
      font-size: var(--text-xl);
      font-weight: 900;
      color: var(--clr-primary-light);
    }

    .stat-label {
      font-size: var(--text-xs);
      color: var(--clr-text-subtle);
      text-align: center;
    }

    .stat-extra {
      font-size: var(--text-xs);
      color: var(--clr-text-muted);
      text-align: center;
      line-height: 1.5;
    }

    .stat-extra strong { color: var(--clr-text); }

    @media (max-width: 400px) {
      .session-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- Fixed overlays -->
  <div id="curtain" aria-hidden="true"></div>
  <div id="confetti-container" aria-hidden="true"></div>
  <button id="btn-mute" class="btn-mute" aria-label="Silenciar audio" title="Silenciar audio">🔊</button>

  <div id="app">

    <!-- ══════════════════ SETUP ══════════════════ -->
    <section id="screen-setup" class="screen active" aria-label="Configuración">
      <header class="screen-header">
        <h1 class="game-title"><span class="title-emoji">✂️</span> Piedra · Papel · Tijeras</h1>
        <p class="game-subtitle">Tú vs CPU · Reveal instantáneo</p>
      </header>

      <div class="card">
        <div class="player-row-single">
          <label for="name-player">Tu nombre</label>
          <input id="name-player" type="text" maxlength="20" placeholder="Jugador"
                 autocomplete="off" spellcheck="false" />
        </div>

        <fieldset class="mode-group">
          <legend>Modo de juego</legend>
          <label class="mode-option">
            <input type="radio" name="mode" value="best-of-3" checked />
            <span class="mode-label">
              <span class="mode-icon">🏆</span>
              <span class="mode-text">
                <strong>Mejor de 3</strong>
                <small>Primera en ganar 2 rondas</small>
              </span>
            </span>
          </label>
          <label class="mode-option">
            <input type="radio" name="mode" value="single" />
            <span class="mode-label">
              <span class="mode-icon">⚡</span>
              <span class="mode-text">
                <strong>Intento único</strong>
                <small>Todo en una sola ronda</small>
              </span>
            </span>
          </label>
        </fieldset>

        <button id="btn-start" class="btn btn-primary btn-lg">¡Jugar!</button>
      </div>

      <a href="/rps/" class="back-hub-link">← Cambiar modo</a>
    </section>

    <!-- ══════════════════ PICK ══════════════════ -->
    <section id="screen-pick" class="screen" aria-label="Selección de jugada">
      <div class="scoreboard">
        <div class="score-block">
          <span class="score-name" id="sb-name-player">Jugador</span>
          <div class="score-roll" id="roll-player"><span class="score-digit">0</span></div>
        </div>
        <div class="scoreboard-center">
          <span class="round-badge" id="pick-round-badge">Ronda 1</span>
        </div>
        <div class="score-block">
          <span class="score-name" id="sb-name-cpu">CPU</span>
          <div class="score-roll" id="roll-cpu"><span class="score-digit">0</span></div>
        </div>
      </div>

      <div class="card pick-card">
        <p class="pick-hint" style="margin-top: var(--sp-2);">Elige tu jugada</p>
        <div class="pick-buttons" id="pick-buttons">
          <button class="btn btn-pick" data-pick="rock" aria-label="Elegir Piedra">
            <span class="pick-emoji">🪨</span>
            <span class="pick-label">Piedra</span>
          </button>
          <button class="btn btn-pick" data-pick="paper" aria-label="Elegir Papel">
            <span class="pick-emoji">📄</span>
            <span class="pick-label">Papel</span>
          </button>
          <button class="btn btn-pick" data-pick="scissors" aria-label="Elegir Tijeras">
            <span class="pick-emoji">✂️</span>
            <span class="pick-label">Tijeras</span>
          </button>
        </div>
      </div>
    </section>

    <!-- ══════════════════ RESULT ══════════════════ -->
    <section id="screen-result" class="screen" aria-label="Resultado de ronda">
      <div class="scoreboard">
        <div class="score-block">
          <span class="score-name" id="res-name-player">Jugador</span>
          <div class="score-roll" id="res-roll-player"><span class="score-digit">0</span></div>
        </div>
        <div class="scoreboard-center">
          <span class="round-badge" id="res-round-badge"></span>
        </div>
        <div class="score-block">
          <span class="score-name" id="res-name-cpu">CPU</span>
          <div class="score-roll" id="res-roll-cpu"><span class="score-digit">0</span></div>
        </div>
      </div>

      <div class="card result-card">
        <div class="result-arena">
          <div class="result-pick-block" id="res-player-block">
            <span class="res-pname" id="res-player-name"></span>
            <span class="res-emoji" id="res-player-emoji"></span>
            <span class="res-pick-label" id="res-player-label"></span>
          </div>
          <div class="result-center-col">
            <div class="result-vs">VS</div>
            <div id="cpu-countdown" class="cpu-countdown" aria-live="polite"></div>
          </div>
          <div class="result-pick-block" id="res-cpu-block">
            <span class="res-pname">CPU</span>
            <span class="res-emoji" id="res-cpu-emoji">✊</span>
            <span class="res-pick-label" id="res-cpu-label"></span>
          </div>
        </div>

        <div id="result-banner" class="result-banner" role="status" aria-live="polite"></div>

        <div class="result-actions">
          <button id="btn-next-round" class="btn btn-primary btn-lg">Siguiente ronda →</button>
          <button id="btn-revenge" class="btn btn-secondary">🔄 Revancha</button>
          <button id="btn-new-game-result" class="btn btn-ghost">Nueva partida</button>
        </div>
      </div>
    </section>

    <!-- ══════════════════ GAME OVER ══════════════════ -->
    <section id="screen-gameover" class="screen" aria-label="Fin de partida">
      <div class="card gameover-card">
        <div class="gameover-trophy" id="go-trophy">🏆</div>
        <h2 class="gameover-title">
          <span id="go-winner-name" class="go-winner-name"></span>
          <span id="go-title-suffix"></span>
        </h2>
        <p class="gameover-subtitle" id="go-subtitle"></p>

        <div class="gameover-score">
          <div class="go-score-block">
            <span class="score-name" id="go-name-player"></span>
            <span class="go-score-val" id="go-val-player">0</span>
          </div>
          <span class="go-dash">—</span>
          <div class="go-score-block">
            <span class="score-name" id="go-name-cpu"></span>
            <span class="go-score-val" id="go-val-cpu">0</span>
          </div>
        </div>

        <!-- Session statistics — shown with fade-in after gameover populates -->
        <div id="session-stats" class="session-stats" aria-label="Estadísticas de sesión">
          <h3 class="session-title">Estadísticas de sesión</h3>
          <div class="session-grid">
            <div class="stat-item">
              <span class="stat-val" id="stat-matches">0</span>
              <span class="stat-label">Partidas</span>
            </div>
            <div class="stat-item">
              <span class="stat-val" id="stat-wins">0</span>
              <span class="stat-label">Ganadas</span>
            </div>
            <div class="stat-item">
              <span class="stat-val" id="stat-losses">0</span>
              <span class="stat-label">Perdidas</span>
            </div>
            <div class="stat-item">
              <span class="stat-val" id="stat-draws">0</span>
              <span class="stat-label">Empatadas</span>
            </div>
          </div>
          <p class="stat-extra">
            Jugada favorita: <strong id="stat-fav">—</strong>
            &nbsp;·&nbsp;
            % victoria: <strong id="stat-winpct">0%</strong>
          </p>
        </div>

        <div class="gameover-actions">
          <button id="btn-revenge-go" class="btn btn-primary btn-lg">🔄 Revancha</button>
          <button id="btn-new-game-go" class="btn btn-ghost">Nueva partida</button>
          <a href="/rps/" class="btn btn-ghost">Cambiar modo</a>
        </div>
      </div>
    </section>

  </div><!-- #app -->

  <script src="/js/game-cpu.js?v=1"></script>
  <script src="/js/audio.js?v=2"></script>
  <script src="/js/ui-cpu.js?v=1"></script>
</body>
</html>
