<body>

  <!-- Fixed overlays -->
  <div id="curtain" aria-hidden="true"></div>
  <div id="confetti-container" aria-hidden="true"></div>
  <button id="btn-mute" class="btn-mute" aria-label="Silenciar audio" title="Silenciar audio">🔊</button>

  <div id="app">

    <!-- ══════════════════ SETUP ══════════════════ -->
    <section id="screen-setup" class="screen active" aria-label="Configuración">
      <header class="screen-header">
        <h1 class="game-title"><span class="title-emoji">✂️</span> Piedra · Papel · Tijeras</h1>
        <p class="game-subtitle">Dos jugadores · Un ganador</p>
      </header>

      <div class="card">
        <div class="players-row">
          <div class="field">
            <label for="name-p1">Jugador 1</label>
            <input id="name-p1" type="text" maxlength="20" placeholder="Jugador 1"
                   autocomplete="off" spellcheck="false" />
          </div>
          <div class="vs-badge">VS</div>
          <div class="field">
            <label for="name-p2">Jugador 2</label>
            <input id="name-p2" type="text" maxlength="20" placeholder="Jugador 2"
                   autocomplete="off" spellcheck="false" />
          </div>
        </div>

        <fieldset class="mode-group">
          <legend>Modo de juego</legend>
          <label class="mode-option">
            <input type="radio" name="mode" value="best-of-3" checked />
            <span class="mode-label">
              <span class="mode-icon">🏆</span>
              <span class="mode-text">
                <strong>Mejor de 3</strong>
                <small>Primera en ganar 2 rondas</small>
              </span>
            </span>
          </label>
          <label class="mode-option">
            <input type="radio" name="mode" value="single" />
            <span class="mode-label">
              <span class="mode-icon">⚡</span>
              <span class="mode-text">
                <strong>Intento único</strong>
                <small>Todo en una sola ronda</small>
              </span>
            </span>
          </label>
        </fieldset>

        <button id="btn-start" class="btn btn-primary btn-lg">Comenzar partida</button>
      </div>

      <a href="/rps/" class="back-hub-link">← Cambiar modo</a>
    </section>

    <!-- ══════════════════ PICK ══════════════════ -->
    <section id="screen-pick" class="screen" aria-label="Selección de jugada">
      <div class="scoreboard">
        <div class="score-block" id="sb-p1-block">
          <span class="score-name" id="sb-name-p1">J1</span>
          <div class="score-roll" id="roll-p1"><span class="score-digit">0</span></div>
        </div>
        <div class="scoreboard-center">
          <span class="round-badge" id="pick-round-badge">Ronda 1</span>
        </div>
        <div class="score-block" id="sb-p2-block">
          <span class="score-name" id="sb-name-p2">J2</span>
          <div class="score-roll" id="roll-p2"><span class="score-digit">0</span></div>
        </div>
      </div>

      <div class="card pick-card">
        <div class="turn-indicator" id="turn-indicator">
          <span class="turn-avatar" id="turn-avatar">J1</span>
          <p class="turn-text">Turno de <strong id="turn-name">Jugador 1</strong></p>
        </div>
        <p class="pick-hint">Elige tu jugada</p>
        <div class="pick-buttons" id="pick-buttons">
          <button class="btn btn-pick" data-pick="rock" aria-label="Elegir Piedra">
            <span class="pick-emoji">🪨</span>
            <span class="pick-label">Piedra</span>
          </button>
          <button class="btn btn-pick" data-pick="paper" aria-label="Elegir Papel">
            <span class="pick-emoji">📄</span>
            <span class="pick-label">Papel</span>
          </button>
          <button class="btn btn-pick" data-pick="scissors" aria-label="Elegir Tijeras">
            <span class="pick-emoji">✂️</span>
            <span class="pick-label">Tijeras</span>
          </button>
        </div>
      </div>
    </section>

    <!-- ══════════════════ HANDOFF ══════════════════ -->
    <section id="screen-handoff" class="screen" aria-label="Pasar dispositivo">
      <div class="card handoff-card">
        <div class="handoff-icon">🤫</div>
        <h2 class="handoff-title">¡Jugada guardada!</h2>
        <p class="handoff-msg">Pasa el dispositivo a <strong id="handoff-player">—</strong></p>
        <p class="handoff-sub">No mires la pantalla hasta que sea tu turno.</p>
        <button id="btn-handoff-ready" class="btn btn-primary btn-lg">
          Listo, soy <span id="handoff-ready-name">—</span>
        </button>
      </div>
    </section>

    <!-- ══════════════════ RESULT ══════════════════ -->
    <section id="screen-result" class="screen" aria-label="Resultado de ronda">
      <div class="scoreboard">
        <div class="score-block">
          <span class="score-name" id="res-name-p1">J1</span>
          <div class="score-roll" id="res-roll-p1"><span class="score-digit">0</span></div>
        </div>
        <div class="scoreboard-center">
          <span class="round-badge" id="res-round-badge"></span>
        </div>
        <div class="score-block">
          <span class="score-name" id="res-name-p2">J2</span>
          <div class="score-roll" id="res-roll-p2"><span class="score-digit">0</span></div>
        </div>
      </div>

      <div class="card result-card">
        <div class="result-arena">
          <div class="result-pick-block" id="res-p1-block">
            <span class="res-pname" id="res-p1-name"></span>
            <span class="res-emoji" id="res-p1-emoji"></span>
            <span class="res-pick-label" id="res-p1-label"></span>
          </div>
          <div class="result-vs">VS</div>
          <div class="result-pick-block" id="res-p2-block">
            <span class="res-pname" id="res-p2-name"></span>
            <span class="res-emoji" id="res-p2-emoji"></span>
            <span class="res-pick-label" id="res-p2-label"></span>
          </div>
        </div>

        <div id="result-banner" class="result-banner" role="status" aria-live="polite"></div>

        <div class="result-actions">
          <button id="btn-next-round" class="btn btn-primary btn-lg">Siguiente ronda →</button>
          <button id="btn-revenge" class="btn btn-secondary">🔄 Revancha</button>
          <button id="btn-new-game-result" class="btn btn-ghost">Nueva partida</button>
        </div>
      </div>
    </section>

    <!-- ══════════════════ GAME OVER ══════════════════ -->
    <section id="screen-gameover" class="screen" aria-label="Fin de partida">
      <div class="card gameover-card">
        <div class="gameover-trophy" id="go-trophy">🏆</div>
        <h2 class="gameover-title">
          <span id="go-winner-name" class="go-winner-name"></span>
          <span id="go-title-suffix"></span>
        </h2>
        <p class="gameover-subtitle" id="go-subtitle"></p>

        <div class="gameover-score">
          <div class="go-score-block">
            <span class="score-name" id="go-name-p1"></span>
            <span class="go-score-val" id="go-val-p1">0</span>
          </div>
          <span class="go-dash">—</span>
          <div class="go-score-block">
            <span class="score-name" id="go-name-p2"></span>
            <span class="go-score-val" id="go-val-p2">0</span>
          </div>
        </div>

        <div class="gameover-actions">
          <button id="btn-revenge-go" class="btn btn-primary btn-lg">🔄 Revancha</button>
          <button id="btn-new-game-go" class="btn btn-ghost">Nueva partida</button>
          <a href="/rps/" class="btn btn-ghost">Cambiar modo</a>
        </div>
      </div>
    </section>

  </div><!-- #app -->

  <script src="/js/analytics.js?v=1"></script>
  <script src="/js/game-local.js?v=2"></script>
  <script src="/js/audio.js?v=2"></script>
  <script src="/js/ui-local.js?v=2"></script>
</body>
</html>
